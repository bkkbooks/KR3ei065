body:
  text: 附錄產前後經驗方長德散產訖服此藥必無諸疾麻葉陰乾收磁器內埋燒麥糠火中血竭虎骨烏犀角各二錢上為細末每服一錢二分好酒送下以微醺為炒產後七日止服凡服此藥產訖不須依椅惟宜平臥若產後數十日舊瘀不盡發諸疾者宜用後方麻葉制同上十錢血竭虎骨烏犀角各三錢上細末服法如前忌青菜川魚等此方武州足立郡浦和領芝村長德寺秘方里人稱枕下藥莕菜湯一名長榮湯又稱山田擺藥治產前產後諸病及金創之妙劑當歸川芎芍藥人參白朮黃芩黃連丁子沉香木香肉桂萍蓬根各等分甘草減半上銼除丁沉木桂余藥炒黃色每服三錢水煎服一方加鬱金熟地黃此方修閤家有種種傳法或酒浸日乾或炒用赤井龍王湯治產前後諸疾及打撲折傷金瘡腹痛食傷淋疾癲狂黃胖病又癰疔諸惡瘡類中風痘瘡後諸症又能解酒毒開鬱冒效驗難悉述當歸川芎芍藥黃耆各上良薑中萍蓬根上木香黃芩黃連各中人參大黃肉桂桂心甘草各下上銼土器中炒每服二錢沸湯漬絞用滓再煎服有熱加柴胡金創筋斷加檳榔中丁子下打撲倍萍蓬根救急飲治婦人臨產血暈悶絕垂死或呵欠或嘔逆或狂躁或譫語失笑及一切危症見者炮姜炮黑豆當歸身川芎益母葉各一錢玄胡索牛膝各二錢上水二大碗煎七分和新鮮童便一盞服如血崩不止本方加炒荊芥人參各二錢赤白帶下白物神散治婦人帶下因氣滯欲鬱血郁者土茯苓炒十五錢當歸川芎薏苡仁牡丹皮各五錢炒人參甘草各二錢上為細末每服一錢白湯送下束帶飲治赤白帶下及產後惡露盡後清血不止者續斷炙艾紅花各上地榆川芎各中地黃芍藥各中當歸上上每服四錢以水一盞半煎取八分服八仙飲治赤白帶下不止陰門瘙癢土茯苓陳皮茯苓木通當歸金銀花大黃川芎各等分上八味每服四錢水二盞煎一盞溫服玄胡索湯治臍下撮刺痛陰冷大寒白帶下黃柏苦楝子各一分附子肉桂各三分玄胡索二分熟地黃一錢炙甘草二分上銼一劑水煎服木香順氣湯治因七情內傷下白帶良薑乾薑炮茴香陳皮縮砂厚朴薑汁炙桔梗蒼朮甘草丁香皮肉桂各等分上銼每服二錢水一盞生薑三片棗二枚煎八分服治梅毒及產後帶下久不止方十全大補湯去人參用地黃一錢加牡丹皮紅花各五分土茯苓二三錢水煎服後宜與妙應散妙應散白朮茯苓陳皮香附子川芎沉香各六錢血竭七錢人參三錢甘草二錢上為細末每服一錢白湯送下如腰腳冷者加熟附子二錢治帶下前陰糜爛癢痛者用此甚神效鰒魚去殼用身腸菖蒲根各等分入土器中燒存性細末白麻油和調敷患處癢痛立愈如聖丹治婦人赤白帶下月經不來白礬蛇床子各等分為末醋打麵糊丸如彈子大以胭脂為衣綿子裹納於陰戶如熱極再換儒門事親坐藥方治婦人久不產陰中隱隱如蟲齧冷冷如風吹或轉胞不通或妊子不成慣墮者硫黃桂皮川芎丁香各等分上為細末以絹袋盛大如指束內陰中坐臥任意勿走行小便時取出更安新者又方治婦人經閉瘀滯下不斷或濃淋下疳腐臭不可近陰中突出如菌子如雞冠不堪焮痛者桃仁大黃各一錢礬石龍腦各五分上如前法納陰中若夫前方惟宜溫下體之氣而後方則下瘀血及青黃濁汁以其諸症漸退為度經閉血瘕溫經湯治經道不通繞臍寒疝痛徹其脈沉緊此由寒氣客血室血凝不行當歸川芎芍藥牡丹皮莪朮各半兩人參牛膝甘草各一兩上㕮咀每服五錢水一盞半煎至八分去滓溫服澤蘭湯調經通血脈治經閉澤蘭二錢柏子仁當歸白芍熟地黃牛膝茺蔚子各一錢五分上七味水煎服通經散治婦人經水不來者紫檀紅花牛膝各二錢肉桂白礬代赭石各一錢上為細末分作五貼三日服盡尚經水不來者更加桔礬二分本事通經丸治婦人室女月水不通疼痛或成血瘕桂心青皮去白大黃炒乾薑川烏頭當歸桃仁莪朮乾漆各等分為末先將四錢用米醋熬成膏和余末調勻搗千杵丸如梧子大曬乾每服二十丸淡醋湯下加至三十丸溫酒亦得鱉甲乾漆散治血瘕症癖鱉甲琥珀大黃乾漆各等分上作散酒服二錢許少時惡血即下若婦人小腸中血下盡即休服也本系甄權方予常加乾漆用之尤效魁蛤丸治瘀血作痛經閉不行香附醋煮四兩桃仁瓦楞子即魁蛤煅醋煮一晝夜各二兩大黃蒸牡丹皮當歸各一兩川芎紅花各半兩為末𩚫餅丸梧子大空心溫酒下三五十丸生生子方乾漆丸治瘀血在膀胱者歸尾紅花各三錢乾漆五錢大黃桃仁各二錢上五味細末醋糊丸梧桐子大每服二三十丸白湯下潰堅丸治經閉血痼腹痛者生漆大黃麵粉各等分上三味煉蜜和調丸梧桐子大每服五分白湯送下日二夜一發赤疹為知崩漏補氣退血湯治婦人血崩氣血兩虛而兼熱者當歸酒洗阿膠人參黃耆白朮梔子炒黑荊芥黃芩地榆艾葉酢炒各一錢川芎七分芍藥八分防風八分地黃一錢半黃連蒲黃各一錢半甘草三分上十七味水煎或薑棗湯煎服大全黃芩湯治經血不止黃芩當歸蒲黃側柏葉各四分艾葉一分生地黃二錢半伏龍肝二錢上七味生薑三片水煎服十全大補湯加香附子棕櫚灰治崩中去血過多木耳散百一治血山崩陳粽木耳蓮房槐木各研存性上等分為細末每服三錢溫酒或米湯調下五靈散治婦人血崩或作肚腹刺痛者五靈脂蒲黃炒官桂雄黃甘草各等分上為細末每服一錢薑湯調下黃連解毒湯加艾葉治血崩不止方見傷寒啟微頭痛壯熱柏葉散證治大還治元氣虛弱崩中漏下久而不止又治白帶柏葉炒續斷炒川芎當歸生地鱉甲龜甲禹餘糧各一兩半阿膠地榆牡蠣煆艾藥鹿茸赤石脂各五錢上為細末米飲下二錢益胃升陽湯治血脫益氣古人之法也先補胃氣以助生長故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之身內穀氣為實黃耆二錢人參神麯炒各一錢半白朮三錢生黃芩二錢升麻柴胡各五分歸身酒洗甘草炙陳皮各一錢上水煎溫服一方用地黃乳癰乳結栝蔞牛蒡湯治乳癰初起寒熱往來乳房紅腫熱痛者栝蔞仁牛蒡子研炒花粉黃芩皂刺連翹金銀花生梔子陳皮甘草各一錢青皮柴胡各五分水二鍾煎八分入煮酒一杯和勻食遠服橘葉散治婦人有孕胎熱為內吹有兒吃乳名外吹致乳結成腫痛寒熱交作甚者噁心嘔吐並服之柴胡陳皮川芎山梔青皮石膏黃芩連翹各一錢橘葉二十個甘草五分水二鍾煎八分食遠服渣再煎服清肝解鬱湯治一切憂鬱氣滯乳結腫硬不疼不癢久漸作疼或胸膈不利肢體倦怠面色痿黃飲食減少陳皮白芍川芎當歸生地半夏各八分青皮遠志茯神貝母蘇葉桔梗各六分香附八分山梔木通甘草各四分水二鍾姜三片煎八分食遠服鯪甲散治乳癰穿山甲皂刺橘葉當歸栝蔞仁木通各等分上六味水煎溫服神效栝蔞散治乳癰乳癌神效丹溪亦云妙捷大栝蔞一個去皮焙為末甘草生當歸酒浸焙各半兩乳香另研沒藥另研各二錢半上為末每用五錢醇酒三鍾慢火熬至一鍾去渣食後服如有奶癌便服此藥可杜絕病根如毒氣已成能化膿為黃水毒未成即於大小便中通利回乳四物湯治產婦無兒吃乳致乳汁腫脹堅硬疼痛難忍當歸川芎白芍熟地各二兩麥芽二兩炒為粗末水二鍾煎八分食遠服蔞貝散治乳中結核漸漸大堅硬疼痛根形散漫者栝蔞貝母天南星甘草生連翹各一錢水二鍾煎八分澄渣加酒二分食遠服一加青皮升麻治乳結硬妙方天南星百草霜各等分為末茶湯調以雞翎塗之予將此方每得奇效皂角散治吹乳皂角燒灰蛤粉各等分為末每服二錢溫酒調下乳岩集驗良方云乳岩先因乳中一粒大如豆漸漸大如雞蛋七八年後方破破則不可治矣宜急服此藥生蟹殼砂鍋內焙焦為末每服二錢酒調下日日服之不可間斷治乳岩奇方露蜂房苦楝子雄鼠屎各燒存性三錢鼠屎入水沉者雄浮者雌也上為細末每服一錢溫酒送下日三又方大栝蔞一個半生半炒酒二鍾煎一鍾食後服又方夏枯草花葉俱擂入食鹽少許再和勻敷患處其效如神鹽分兩以適人口為佳乳癌神方守宮燒存性為末醋和敷患處化癌煎大西洋方治一切癌瘡奇良上鹿角生屑上桂枝中甘草下每服三錢水二盞煎一盞日服三貼十六味流氣飲治乳癌當歸川芎白芍黃耆人參官桂厚朴桔梗枳殼烏藥木香檳榔白芷防風紫蘇甘草等分上銼一劑水煎服治乳頭裂破方以蛤粉胭脂等分水調傅治乳頭為兒所齧裂破不瘥粳米飯燒存性為末傅患處又方鼴鼠燒存性細末津液調傅療乳癰初得令消方赤小豆菵草等分上為細末苦酒和傅之愈療乳癰或瘡久不差膿汁出疼痛欲死不可忍鹿角二兩甘草半兩上為細末用雞子白和於銅器中暖溫傅患處日五七易即愈東宿治程玉吾內人妊已七月乳忽紅腫而痛灑淅惡寒發熱而成內吹以大栝蔞四錢為君當馬尾二錢為臣甘草節蒲公英貝母連翹各一錢二分為佐柴胡青皮各八分橘藥五片為使水煎飲之兩劑而瘳此方治驗不可勝數若將成膿可加白芷周依此方每奏奇效因舉於此陰瘡陰腫苦參煎周新定方治婦人陰中生瘡膿汁淋瀝疼痛者神效苦參五錢防風鼠麴草荊芥野菊花蛇床子各二錢半以水二升煮取一升六合熏洗即愈菖蒲散赤水治月水澀滯陰戶腫痛菖蒲當歸炒各一兩秦艽二兩上每服五錢入蔥白水煎服白礬散同治陰腫堅痛白礬五錢甘草五分大黃一兩上為末水調如棗大綿裹內陰中一日兩換以愈為度治婦人陰中突出如菌四圍腫痛內用補中益氣加山梔茯苓車前子或加味歸脾湯外以生豬脂和藜蘆末塗之而收同上余治一婦人妊娠六月陰中突出如菌其色灰白有皺紋以龍膽瀉肝湯加白芷金銀花六七日而全愈頃閱香奩潤色治女人陰門忽生雞冠或瘰者用瀉肝湯加大黃一錢即消與余治驗正同小網街賣油商作兵衛妻產後陰門傷破數日不瘥後潰爛膿水常出而痛楚亦甚已逾一月尚不愈予用柞皮湯及薰洗方十餘日而全安二方並見黴癘新書宜以參看本船街肉糕鋪平三郎妻娠孕患子腫數月不消漸小便短少至臨月腰腳腫尤甚忽陰門大腫如股間挾球陰肉垂下殆似牛舌其色㿠白如水晶開股屈腳倚褥仰坐兩膝以枕承之兀然不能轉側眾醫用利水及熏洗之劑毫末無效勢增劇矣乃迎予求治予曰此症甚易易即以三稜針刺陰門腫上左右各三痏垂肉上一痏清水滴出便以故絮裹之通宵水出盡而陰門復常次日予往則婦離床跪坐若未始有病者後逾六日分娩如達後橐吾飲禹翼湯交用而腰腳腫悉消未三候而動履如初曲頭管圖式曲頭管長六寸大如小筆管曲頭七分於頭端上際穿一小孔為出藥處當以銅或銀製之此管不獨可用子癇又產後痙病其他卒中風小兒驚癇等之症牙關緊閉者宜以此管灌藥矣而其灌藥法須以管頸入口內隨齒進之至牙齒不生處以曲頭入上下齦間乃醫自銜藥自管下口向喉里吹灌之是不須開牙關落藥於咽中之良法也此管真救卒病之神器醫家不可一日無也
