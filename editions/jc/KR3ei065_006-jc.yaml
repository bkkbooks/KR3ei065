body:
  text: 卷六懷孕圖式及易產艱產雙生逆生等諸圖產論翼中所載總三十有二非不詳悉矣而唯其間被膜胎圖尤欠妥當因舉予之所親見者以釋醫家疑團其他圖記一二所發明者及胞衣形狀聊以補遺漏焉又並附明錢雷胎元圖說英機黎國救難產圖二道及喎蘭醫牒分的兒之臨產艱易諸圖二十有七以備參考云大如瓜灰色而稍帶淡紫割之見其裡面則恰如過臘魚子其色鮮黃而有青赤筋絡毛髮未生九竅未開頭獨大而手足甚小自巔至腳底長三寸六分狀如泥塑人非尋常六月胎矣蓋孕婦抱病胎不長者歟抑病中而受胎者歟未可知也胎之形狀大小與前圖同而唯臍帶纏頸一匝世俗以為失踞則臍帶必纏兒頸誰知胚胎之始有肚帶自纏者孫真人云三月有血脈四月形體成然有未滿九十日已如此者則難一定也胞衣在腹前其形橢上至頷下下連臍下其四邊薄皮引出以包裹胎猶雲母屏中物兒倒首向脊裡屈曲手足著頷於缺盆骨上而面與膝頭相聚其形如低頭窺臍者兒體素上頭下足此為逆孕自足出者皆是也駢胎在子宮中累重於前後其分娩則後者先出而前者後生也先出者正產後出者逆生是也胞之著於子宮裡各異其所矣此孕蓋交接二而並受胎者也尋常懷孕胞必對兒腹駢胎則以與常異故胞之所在亦不一定也以兒子逆出既至頸胞亦隨兒自下而蓋頭上也非素在頭上矣中央最厚至邊而漸薄高低出沒皺文錯交其色紫紅綠黑相雜而又有紫黑濃斑點紋理筋絡似荷葉裡面而其色淡紫碧筋絡有粗密之異不一樣子宮形如倒壺盧其左右上側各數丸子附著焉解體新書所謂卵巢者是也口形則作十字樣此山脅東洋解刑婦體而所親見者也尋常胞衣易下者皆為此狀此症產訖即不施治術則竟不下而死肚帶一生中央一生一邊如此者常多胞莖抽一二寸而作兩股此奇中之最奇者也以上二十七圖並周之所錄也今亦舉華蠻之圖式於後以備於參考明錢雷人鏡經胎元圖說云精氣盛則成二男血氣盛則成二女精血皆盛則成一男一女或精血散分則成品胎或精血混雜則成非男非女男不可為父女不可為母皆非純氣或感邪祟鬼怪之沴氣則成異類矣精勝其血自左子宮受氣而男形成精不勝血自右子宮受氣而女形成周向得英機黎國醫所編產科書然以其文字絕異固不可讀特其所載易難諸產圖總十有五而畫極精妙最足觀矣蓋其遇難產子難達則必以器出之雖其器制不能詳此死中求活之一奇器也因撮出圖式二道以錄於此智巧之士仿此製造臨事施之則可謂回生之一助也已下二十有七圖喎蘭醫牒分的兒產科書中所載也凡從胎之位置正變以至難易諸產盡寫其形狀究其變態而其治術論說亦復詳審雖然以其文異其辭殊不遽易解今姑譯其圖說請寒岩馬文奎縮其圖而摸之舉其梗概以示同志云兒面於腹前在子宮圖此為正孕大抵轉身而自頭出者是也兒面於脊骨在子宮圖此為變孕以其非正孕多艱於產然其將分娩也或有轉身而出者或有不回身自足露出者雖然孕狀如此者每多逆生正孕者兒已轉身而其頭直向產門圖此為順產同上子宮口正而不歪斜胎之位置亦正而易產圖面於背者已轉身將出而以子宮差寬闊故兒頭未望於其口圖正孕者轉身欲出而其頤撐橫骨而不能出先露雙手圖子宮素傾側其底偏於右而其口向左之監骨捷骨際是故兒雖已轉身但向其口而不能出子門圖兒已轉身而其頭抵母之橫骨欲出而不出力息頻到先出臍帶圖子宮欹斜而偏於右其口向左邊因此兒頭抵母之左監骨而不能出遂肚帶先露圖子宮欹側其底偏於右其口向左捷骨因之兒頭拒左監骨不能出而肘臂及臍帶出圖子宮口向左監骨與橫骨之間而兒頭礙橫骨右邊將先出其肩圖兒頭拒橫骨與監骨而先出手圖兒側面低頭絆臍帶於頸體屈曲而將先露兩腳圖子宮不正其底偏於右其口向左監骨及捷骨際而兒體亦傾側圖面於背者必不轉身偶屈折舉手腳先露臀尻圖兒側面體彎屈而舉兩足聚於面其臀向人門右手先出圖兒體頎側反折而其腹向子門乃露臍帶圖兒體欹側仰而屈身舉兩腳湊於上背脊向產門而臍帶將出圖雙胎元頎側俱失轉身而不能分娩先露臍帶圖兒失轉身而先露右腳圖兒失轉身而露兩腳圖子宮歪斜其口向腰椎是以兒轉身將出而頭向其口圖子宮不正其底當脊椎其口向腹前兒已轉身將出而頭拄橫骨難出圖子宮不正兒轉身將出而左肩拒橫骨圖與前圖同而右肩礙橫骨圖子宮不正其底偏於右其口向監骨及橫骨左邊而兒體亦欹側而頭向其口圖子宮不正其底偏於右其口向左監骨及腰椎之間而幾面於背而向其口圖
