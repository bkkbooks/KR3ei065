body:
  text: 卷五治驗三十四道福山侯臣某住丸山第其妻臨産腰腹俱痛莫有休止卻不免者四日醫者踵接治卒無一驗精神狼狽腰重如帶五千錢小恭缺利者一日夜因而更腹滿致加重若覆箕啼泣呻吟欲求自盡至使傍人悸或以為駢胎或以為子死腹中衆論落落不一舉家虩虩決之蓍揲者釋策曰此卦得醫於東南而有幽谷回春之象焉乃商親知問擅名於東南者同僚中澤養亭曰我曩讀櫟窗先生序於黴癘新書而知片倉深甫工於産蓐之技是以上年山婦娠孕患水腫時倚渠而得全安其居今正中東南亟迎治之或可無恙遂修書懇豫治診往診視之患狀雖似危殆喜脈迢迢有神尤可措手乃曰無慮得小恭利苦楚必安以加味芎歸湯煎服之而施導水術則隨手小恭利約數升忽艱若悉釋貼席而睡於是舉族始悸定心降豫曰今夜必可達即便歸矣而夜過半叩豫門急孰生起問之則報曰丸山産者復號呼悶亂幾至於死請速再診視豫謁使者曰黃昏細察無可慮何倏爾有此大變乎是必迫免身者爾淫雨泥濘途遠而夜闌奚須冒此往乎便合牛膝散二帖獨行散一帖囑使者曰娩訖宜交用之也使者持之還家則坐婆已褰裳澡浴兒矣婦則若遽然惡夢始覺神思清爽不數日而步履飲啖一如舊矣一染戶街鋸子匠妻難産不達速豫治診時豫不在門人往與藥娩死胎訖喘息煩悶身若燔炭汗淋漓如雨口渴氣促人事昏憒語言含舌不清門人與折衝飲嘔加而大便瀉下二次譫語昏沉舉家驚怖議治於豫診之六脈洪數鼓指豫曰此中氣大虛虛陽浮散之所致皆假熱症也以還元煎倍用童便旬余而全瘳門人服豫之立方神矣二難波街一店主婦方臨月忽腹痛頻來腰間重墜皆以為迫産期急呼穩婆又服催生藥以待焉一日夜而痛止只腰腹拘急伸舒則攣痛矣已逾候不産且小便不通二日求治於豫乃撫摩其腹數十回而後探宮試之兒頭在高皮膜未破謂曰未娩期勿倉皇便與脫花煎次日惡露少下尚不腹痛於是衆說蜂起以為子死於腹中急豫請診豫方視其惡露有生活氣而無臭穢氣因斷言曰決非死胎若誤用鬥藥必有害焉尚服前方矣逮其夜醜寅間遽陳痛來生一女子而母亦無恙三百田善兵衛妻亦臨産與前相似其症臘月二十九日腹疼腰痛往來五六次至翌日子門水血俱下腰胯重墜陳痛頻來莫能當便以為娩期強令努力尚不分娩自此日日小腹脹痛育門窘迫時來時止遷延六七日證守定略無進退更飲餌不進小溲閉塞於是病家甘分死胎惟要令早娩而持母命正月八日夜初更敦豫求治脈之沉弦有神且所下血腥有活氣而無死臭豫曰臨盆雖數日不有死胎候乃發救生加附子湯曰宜飲之待其自然焉百田曰曩我親族艱産纍日先生來而投劑施術即時免死胎母無恙矣今於荊妻艱苦之際特與藥不施術者以婦命不可救歟自走使於先生婦俟臨顧者甚於久旱望雲霓飢渴求飲食幸賴先生手術得娩則今宵産今宵死無恨也孕婦亦踵而速分娩豫曰曷不解事之甚也若夫胎死不免母氣脫困則雖一二日必當令亟免身以救母命矣今雖近浹旬胎猶無恙奚可用手法以促此哉俟明旦則必有熊羆之喜也拂袂便歸矣次日早晨修書曰荊婦逮黎明忽陳痛頻來舉男兒而子母平安昨夜診視之不差豈不敬服哉實非老手識練必不能為此明鑑也四淺草天王橋頭一商賈妻臨産子露半身而不娩易收生媼三人皆不能出而逃去遂召産科專門治療之醫乃與門生俱來自辰至巳手術藥劑百計治竟無效産婦精神漸疲困於是求治於余諦觀其色則青慘眼胞陷下所幸者脈尚和緩尤可措手便以芎歸理中湯頻與之將用手法則兒頭已切而項邊僅留皮寸許因呼主人謂曰兒頸已如此我使此娩汝勿言為我首體異處主人唯唯退余乃以兩大指緊推兒膈俞邊則育門才得寬鬆而畜水迸出三升許乃以袽裹兒一引如拔無根草瞥然産下矣闔家少長皆無不感嘆以為神也乃使婦蓐臥用前方三日精神大王唯腹中有塊大如茶甌以手推之左右移動仍於前方內加丹皮桃仁五日而穢水大下塊消其大半飲食頗進七八日不圊因與桃核承氣湯二日而尚自若也更欲作大劑與之又竊思疲勞未復非激劑過用所宜也遂將八珍湯加營實桃仁丹皮兼以龍飛丸臨臥與五十粒二日而得燥屎一升許塊如失更以當歸建中湯調養二旬而寢食俱安矣余初見兒之露半身不出即以為此必下身肥大産論所謂壯尻胎也然行導水術而見子生地則尋常胎也便知此畜水填滿膀胱壓胎而然者也此産論所未言及者也子宮之所位在尿胞後廣腸前有臨産兒頭向陰門久不娩則為之尿道閉塞且多服催生藥使尿胞填滿而産道愈窄狹害乎達生者其二日已上者須施導水術以泄畜水使子宮得寬鬆而易免焉若死胎候具則以回生術救之又有産訖胞衣不下者間由尿胞畜水怒脹壓胞衣不下者治之之法在心融手巧須口授面命非筆下之可形容有志君子來而詢之則可矣我豈敢祕惜者也哉五伊勢坊道成橋頭熊野屋重兵衛妻逆産子露頸以下頭獨不出穩媼數人交施展手法不能令娩諸醫亦湯劑亂投全然不應後延專科二人相與商確作劑進之以蜂蜜塗産戶極力引之則頭不動而卻援移母體三尺更腰胯重墜橫骨監骨幾摧通宵叫痛不輟聲於是子店友朋所薦來醫輿出入若織機然診視畢悉駭辭不治專科二人尚在後堂對坐藥箱傍舉觴以俟其達矣舅姑親戚郡然張惶禱禳百般無所不至矣偶藥鋪佐平以豫療奇疾推獎懇之紹介速豫治診時日在辰巳間適門頭請劑者數十人不暇捨去便報曰發劑畢即往焉使歸未一飯頃復促診診者再四漏已晌午乃率弟子策往則男女蟻集慌忙紛擾不遑辨何為其主直延豫於房內婦側臥床褥緊握坐婆手尚呻呼不輟口環坐相扶者七八人豫脈之緩而有神私喜以為可治也乃視小兒時肌冷如冰氣脈絶無呼主人謂曰兒業已殤然産婦精神未疲憊即今施治即今可達也滿坐羅拜於地曰多方治之無一效産母艱苦不忍見乃速豫治劑豫消十全湯背加人參二錢與之專科二人遙望之目諾微笑蓋似誚豫劑之平平者矣豫留看視者二人以圍屏遮房門坐産婦傍吃茶吹煙命策使婦仰臥卷小褥入腎下令舉之矣此時家族及醫者自屏外隙處伺視者數人豫乃以手巾縛兒頸二匝以覆蓋不令見人使策持手巾豫以綿衣裹兒捉持之一齊併力向下邊緩緩拽之放右手進兒頷邊則得兒口急緊搦之又一齊強引一回忽然産下此時滿堂稠人感嘆讚美之聲猶風吹松樹為老龍吟老嫗輩則以豫為藥師如來現世矣而專科聆之赧然稱奇而去豫就視兒子其頭頵腄醜惡殊甚宜哉其不出矣而豫歸舍則病家持棘鬣魚二頭來而謝再造之恩後以行瘀煎桂枝調血飲調養二旬而復舊此等治法豫術不足以為奇而人昏唶唶遞稱譽以為神矣噫近世有不學徒以此類售虛名者君子所深恥也六神門外松下街米客某妻年二十歲懷孕以來壯健勝於平日而逾臨月之四日俄然發戰栗直視口噤喉間喘鳴鼻流清涕兩手搐搦如拽鋸背脊反張類痙病氣上衝心下不省人事命如風前燈已延醫氏二人治之以其口噤不開不能灌藥因灸隱白湧泉等並不效各束手辭謝遂迓余乞治余到則先福井主一在坐乃曰我在京日聞足下之精於醫術尚矣今孕婦疾勢危急甚請為治療余便行至後堂則婦跪坐於褥上衆人抱持之舉大聲呼其名父母在屏外痛怚號泣余先命坐婆令緊按其心下扶容穴乃診脈緩而有神氣竊以為可治即以單兵散延命散各一錢許白湯攪勻自含之以曲頭管自齒齦極處入管頭吹送藥乃以左手捻其鼻則嘓然有聲藥落咽而忽諸症頗穩乃作大黃黃連瀉心湯加鐵鏽交用之過二三時而始醒索食其夜人定力息頻來娩死胎而母無恙但血枕痛頗來與山楂子丹皮二味六七日惡露快下而康安如常日七余之同街採緞鋪勘介妻年十七懷孕數月無有他故其父母以為夫婦青年家無嚴君婢妾亦不有慣産者已至九月招膝下保護矣其家在本所東江精舍北里許距本銀街六里有奇而彌月初二日辰巳間澡浴後忽然暈厥目作上視裸裎不暇羞恥痰涎湧盛角弓反張煩擾悶躁手足瘛瘲昏憒不知人事看守者抱時則或捶或咋急走使迓余余會應鯖江侯招往三田邸是以延醫氏三四輩纍經治療不見減瘥更嘔血盈盆至此病勢轉凶衆工無藥術頻令人急豫病家甘分必死唯延領待余到余黃昏歸家其家所來轎伕數人俟者多時余便往診視前證依然喜脈緩而有神余謂其親曰凡子癇症以子死於腹中與症疝擊搏而發焉長女疾患稍醒則必當子向産門若向門則我術以令娩娩必性命無恙矣一醫在傍曰子在高而腰腹不痛今夜安能向産門余為不聞命弟子策將膽星一二錢白湯化開以曲頭管灌之仍捻其鼻使落喉須臾反張稍定繼以三黃熟艾湯加硃砂二錢自亥至醜服五貼盡煩躁有間乃大聲呼其名才答試不用管飲藥則自能飲便探其産戶兒頭既已向門乃用雲母散三錢續與稀粥助母氣以催生已至黎明猶未分娩時時目瞪切齒煩躁悶亂於是以回生術得娩死胎即以加味芎歸湯兼用震靈散二日尚神氣未醒三日而稍辨親疏四日而忽開兩目問其母曰我緣何至此母曰你發子癇幾死數日不省得鶴陵先生治之乃活婦聞之始知已産矣唯惡露不下小腹硬滿用行瘀煎三日血衊快下而小腹軟與加味八珍湯調燮數日而平復嗟呼余狐疑不決而不施術失時姑息恐不分娩而斃也故醫之臨疾患在權時宜而已八小田原街賣魚客甚八妻産前患腳腫産後三日身面四肢皆浮眼胞腫而無縫小水短少一臘之後氣喘咳嗽不能貼席而睡飲食減三之二更腰腳愈腫按之窅然不起懇豫請劑診視之皮膚無光澤腫勢不可言惟精神存用禹翼湯十劑而全瘳九花坊販繒客妻産後左腳獨腫大如漆桶小溲不利以禹翼湯加桃仁紫葳小溲日解約三升許五日而平復十一貴家乳母方夏月忽患惡寒戰栗發熱頭痛煩渴引飲腹裡拘急證醫為溫病治之已三日戰栗拘急才止而熱勢益猛汗漐然出飲食不進呻吟在床枕偶有誤信余之能治傷寒之虛名以勸余者遂延求治診其脈洪數按其腹軟弱如綿絮拊之而手漸及臍下則忽鼻嗅血腥余以為是必竊行墮胎坐藥而然者乃欲詢其實以旁有人不肯出言出房呼老婢私謂曰乳母候證非溫病必由小産者爾乃與行瘀煎兼用失笑散惡露漸漸下熱解渴止飲食日進十有餘日而諸症平初老婢聞余言大愕乃與其家臣長相商入房內遠人便以余言詰問之始吐其實矣乃及其疾患差即追之此症孀婦室女或貧而子多者往往有匿其實請治者須以其腹軟弱按之如綿絮者與鼻聞血臭者斷為小産也若夫尋常經水來者其腹必不如綿絮又其血腥頗殊焉然其血腥之異同非毛穎所能盡也有志士其能用意則自判然十一豫同坊第二街舂米客某妻産後口中糜爛飲食用糒音門粥凝也猶觸口裡痛不可忍因僅啜淡粥之爛者而充飢治療三月略不見功遂來豫廬商治診視得濕毒候乃以喉癬湯對薔薇遺糧湯煎飲之外以白梅昆布各三錢巴豆一錢五分俱燒存性為細末敷於患處日三二十餘日而能食如常十二鳴戶驛澱橋頭太和屋傳四郎妻年二十五歲天受瘦𤸆甲寅五月經止後氣宇不和飲餌不美時臥時起酷似阻病候矣逮逾兩月小腹微滿重按有塊大如鴨卵或以為妊或以為非妊而忽患下利頻並裡急後重證歷十餘日而平復後形容更臞腹滿漸減於是舉家甘分非娠醫亦為畜血療之數十日後偶罹陰陽之患發熱惡寒頭痛汗出面如渥丹醫氏曰此尋常感傷談笑可以已矣乃發劑調治七八日病轉劇烈譫語煩躁昏困不省心下痞悶大過下利小溲赤澀一醫用復元湯投之漠如也又延一醫曰此小柴胡湯適證也乃服之下利煩躁將至顛巇於是不厭距余廬十有餘里之遠以禮來迓余余往診其脈沉微數舌胎沉香色虛里劇動臍下有一塊豫按捫數回欲判胎與塊不能辨認乃出房問侍病者曰大便色不漆黑乎曰黑又問時無笑乎曰有余曰婦人稟賦薄弱且曩患下利而正氣未復更用破血之劑今又患傷寒已有所問二候則實不可救療也余連辭將去則房內喧鬧忽報云婦危急甚促余進看行至後堂看視者云病婦今跨淨器大過訖而産門下一物見之則胎也由此昏冒困憊為劇請速賜治劑火急之際余不可辭先以人參五錢緊火煎與之繼以還元煎而後視其所墮胎其頭未生毛髮而色紅赤手足細小如厚紙作為者兩手則冒心兩腳則屈曲不伸其色皆水葒色唯四末之爪處白肉也又胸背脅臀則其色深赤腹部則紫黑色帶青色肋骨高起膈皮可數九竅蓋白膜而稍高特鼻隼則隆起而大臍帶甚細色皎白胞衣留母腹不下是故未能審也兒頭較身體甚大余以曲尺度之自巔至腳底二寸六分展其腳而度之則三寸六分其形如泥塑人可以安掌中也圖見卷六余按此婦天賦怯弱又且多病其懷孕雖五越月血氣不能將養胎而不長者爾今視此等胎容則賀川先生所謂展手膊而依脅膀之說益難取信也而此婦疲極羸憊益劇歷三日而卒斃十三豫之同坊一木工妻前年春舉一子後未數月經水來如常而翌年三月忽經水不來至五月初自知為懷孕遂與其夫相商就市中墮胎媼用坐藥既而汙水漏下寒栗戰齒烘烘蒸熱腹疼腰痛苦楚不可言而胎尚不下於是怖而求治於余乃合大劑脫花煎服之乃得分娩調理七日而全可矣余看其所墮者已成形而與前案所論其大小正同但胞帶絆頸一匝此為異而已此受孕僅三個月計日數六十餘日不但胎成形又臍帶自絆頸於是便知成胎之始偶有臍帶自絆頸者前哲曰妊娠至五月始成形又以臍帶絆肩者此名礙産即為轉身之時所致者臆度亦甚今圖記其形狀以告同志者使知常套不可信據也圖式見末卷十四高崎侯臣朝岡角左衛門妻月信不爽期但其來少而腹漸漸大或以為娠或以為瘀既歷數月猶不能決焉其歸之於娠亦未能定受胎月求治於余余診按其脈腹曰蓋此八月之始也朝岡曰孕而經水來世有此證歟余曰古人謂之漏胎又名胎漏及胞阻或又稱狗兒胎武州川肥方言曰看花胎余適記得虞摶屬氣虛有熱之說乃將四物湯加阿膠白朮條芩縮砂香附炒黑艾葉糯米用之數十日經水不復來既而彌月腰腹不疼痛而血復漏下余竊以為此漸迫産氣者乃與補血暖宮之劑尋四五日血仍漸漸漏下腹亦漸漸縮小後下血塊大如鴨卵者兩枚而腹益緊小且小溲閟絶初為瘀血者揚揚得志大言自矜曰吾儕業醫皆三代診視必不謬矣而誚余之診訣浮焉乃命使速余至而扣豫曰雖證候如此足下尚以為妊娠乎余診其脈緩弱候其腹縮小而小腹結硬如斗按之如石詢其所下血有臭氣乎否則婦曰始則血腥耳今日稍有穢氣余謂朝岡曰今詳內人脈狀證候實非尋常臨産候蓋衆醫所見或當弗差雖然余獨以難斷然為畜血何則血塊既下而又豈有忽小便閟絶之理哉此必兒頭下墜而塞人門者也又腹緊小而不疼痛脈亦不進且所下稍有穢氣者是恐子死腹中者也若夫有力息陳痛等證則余當一搜宮而即決焉然其候未有而豈妄搜陰僻地哉請俟一宿則必判然也如內人命必勿慮余實有所察焉遂與盤珠煎而歸其夕力息不來而果子自臨産戶復忙走人迓余便往命坐婆強努力遂娩死胎而婦無恙嗟乎吾為衆醫說所惑以為瘀血則不能免雪上加霜之謬診也醫之臨疾病其不可不慎也十五高砂坊釀家某妻年向三十天稟壯實形體充肥寬政癸丑四月經止後孕狀既已具至甲寅二月未産人或曰初孕則往往逾期月者耳便晏然俟焉又逾月而尚未生腹漸漸大而猶抱甕狀親知見駭必非駢胎則品胎也遂延余請藥余乃據羅謙甫妊娠月足而不産者當補血行滯之說措劑即四物湯加香附縮砂紫蘇枳殼桃仁婦俟分娩日又一日猶飢人思食渴者欲水既而又過一月婦慮産期之不來屢責余促免身余曰雖積纍月於期月精神氣宇略無小異何慮之有古人已有瓜熟自落之譬則宜任其自然也余又戲謂曰昔帝堯十四月生老聃十八年生則必當賢才子生而慰其情矣而至五月五日夜遽腰腹稍拘急産門水少下於是喜其當産深夜走使邀余時余適有微恙是以饋藥不到明旦不俟日出而往則醫者二人在堂上余問曰何以延醫之多也主曰昨夜君不到因招鄰坊一醫乃診視曰此難産也非我一人可能收遂延其族醫將與俱併力以強令分娩焉豫就詳其證候非臨産候所謂弄痛耳乃曰何可以此為難産哉二醫在傍互目諾咋舌掩口余曰若夫欲早免身而按腹揉腰服催生藥則後必噬臍也乃用十全散五貼腰腹拘痛頓止而如故婦厭雖服藥其久不産遂不復服自是又歷一月而始努力陳痛頻來下血七八升疼痛止而腹滿減其半尚未達穩婆或以為非孕余往與藥至黎明舉一女而産母平安如常日但惜生子不出三朝而殤此婦懷孕既十有五月而才生産其子不育者誠可悼哉嗚呼懷孕變化無有一定庸醫慌忙每惑人意業此技者不可不詳練也十六小網街一艌匠妻臨産五日不娩逆豫求治診察其證候子既死腹中與盤珠煎兼用雲母散自辰至下午服各三帖盡殤兒生地而産後小水不禁用鹿蠣飲十有餘日而漸漸復故十七天野君夫人年二十三初受娠孕稟賦怯弱原有肝鬱症辛亥九月十五日生一男子産後三四日惡露下少一醫作劑進之泄瀉日二三行至一臘忽精神昏迷不省人事小腹有一氣起時時升心下胸中衝跳不止煩擾悶躁痛劇欲死呻吟撼鄰其父鵜殿君常在傍即按撫胸腹久之漸定如眠如醒津津汗出過半時許則惕然驚醒開眼而發前候如此者已三日夜大便微利小便遺矢常置敗絮於臀下濕則換易之故小便清濁難辨與之粥飯則才食一二口而後噤口不納湯劑丸散種種施之全然不應二十九日逆豫為治探其脈沉弦無力腹濡近虛據見證則似畜血視脈與腹則為心虛肝亢矣豫苦措劑姑以淡竹茹湯加酸棗仁飲之外將鉤藤鉤三錢甘草一錢水煎送下震靈散二三錢二日而略無影響十月二日改用七寶散兼以舉卿故拜散下利始止譫言妄語轉加以手捶人乃三黃瀉心湯加柴胡鉤藤牡蠣病勢愈增劇至此危急甚舉族嘆為物故矣豫亦以屢改方漠如無效恐診之未准明早往而細察之腹總虛軟手至臍下橫骨邊重按則磊塊纍纍在腹底觸指下更重手按之則患者皺眉於是方悟病根全在茲與滯患相搏諸症叢集者也便放膽合大劑桃核承氣湯加鐵砂二錢鉤藤一錢自旦至夜半服三劑盡則至黎明大下三四行自此病祟十減其六豫以為雖藥中肯綮其人素虛弱鬥藥爭方不宜久服改以淡竹茹湯為主副以三黃加鐵砂湯間服之三日而諸症大平小腹塊如失乃改副煎換抑肝散至十月十日神思始清與傍人說話至十一日始得起床而又跨淨器自更衣矣乃以十全湯調養旬余而康安如常日矣患者起床之日其大孺人喜曰便溺遺失已半月幸依君之力得救一女於死地矣自此每歲冬夏贈時服白鏹謝活命之恩者六年於今云十八豐島街賣故衣某妻臨盆子露手膊生婆不能收迎專科求治師與門生俱來殫力罄技反子益橫其手及肘竟日不産遂截斷其肘而猶不能渠以技竅稱病先歸矣門生亦欲辭去則病家不可乃揚言曰諸君已切去兒手而今棄去則小人無所依倚惟得分娩雖死無憾請為度之矣門生益騂羞無能為計與鄰翁相商夜四鼓邀豫乞診門生謁豫曰幸先生來我將歸去豫留之曰諸君畢力不産豫亦恐不能為也豫姑試之足下必莫歸矣以其家隘門生待於鄰翁豫乃診視子僕於腹中如橫梁狀探之得脊骨此亦艱産中所罕有而實不易治也焉雖形體已瘁眼精脈神俱尚五分存庶僥幸於萬一亟以芎歸理中湯倍用人參煎服尋以回生術得令免矣門生聞之不謁於豫去矣而當坐婆收拾之主人取隻手於庖廚來而合藏之嗚呼稱今之産科者僅傅賀川先生說急於鬻己術往往致有斯過失反使先生方術人多置議也先生嘗以有初學術未精欲早施之於事者引莊子之見卵求時夜之譬以警之其可不謹哉十九住吉街賣油商某妻年十九孕逾五月患痢所下皆白膿腹痛裡急後重日夜三十餘度時醫治與丹水逆挽湯逾候反嘔吐頭痛發熱口渴赤白俱下腰重墜難當更衣五十餘次腹疼來則喊叫之聲四舍悚駭至此疾勢危急家人畏怖胎隕夜過半亟叩豫門起而問之曰為産者急矣即往而診之其脈三部弦數指下纍纍如薏苡子狀豫曰此有餘症也急治胎當保持乃合黃芩加半夏生薑湯伏龍肝澄清汁煎煮與之二貼而嘔逆頓止乃改以八味蕩滯飲進之兼服四寶丹十二粒兩日而腹痛纏墜如失痢減十之六五日而穢積已盡糟粕未實晚間糞如兔屎狀者一二枚雜下改以十全大補湯加酒炒大黃一小匕駸駸平復及彌月而生好男子若拘常禁不用半夏大黃巴豆等專用補脾滋血之藥豈不誤哉二十男谷鳩齊妾妊娠九月忽腰腹痛而産門下血求治於豫診之外無寒熱飲食如故大小便自可乃將芎歸膠艾湯加西洋參一錢黑炒乾姜三分兼以雙烏散一二錢三日而腹痛止下血亦漸漸減守用前方八日而全愈歷十有餘日足月而産一男矣凡孕而七八月以後腹痛有所見久不止則致半産者常多矣又間有延期月猶不止者雖飲食健啖逮臨産多生變症難救焉故妊中下血不可不懼也二十一傳馬街一商賈某妻期月臨盆子露手膊不收呻吟無賴其鄰有所立庵者雖與豫交未深傳聞豫之屢救艱産便致書以求治時余不在黃昏歸家則孰生謂曰傳馬街産者告急者已三小子等詢之則使者曰橫生也豫終日省衆患疲倦太甚雖稍生厭心亦重人命所繫乃往至所醫家則見一醫氏坐堂上披藥箱措劑豫問所醫曰鄰婦已免乎曰未也豫曰良醫來製藥我當辭去所醫留豫曰纍書迓先生俱不在是以招弘前候醫官樋口道泉亦以當直令其弟子代之今請藥者即是也請先生一診視之豫乃通名刺於醫氏畢問曰産婦可達歟曰甚難因修書呼同學其來則須相與商矣豫與所醫俱至鄰家看脈詳證兒露左手已至肘豫曰此艱産中之尤至難者也樋口自來施治則可也今醫生曰宜召同學併力救之則以手術未精練爾我與藥而用手法則目下可産也我非與渠爭技非利資財又非顯我功以求名今産婦頗疲困若延引時刻則精神瘁憊假令産母命殆矣便主人與所醫商確遂乃托豫作救生湯加人參一錢以回生術得娩焉乃與還元煎相囑曰此症不可遽用破血之劑但宜用補脾暖宮之藥正氣旺後隨症治之次晨使奴曰昨夜忽惡寒戰栗因延他醫醫謂前劑缺當便與折衝飲差是以姑辭先生治劑而服前方六日忽然脫血而斃二十二福井街古董客藤八妻臨産五日不娩服藥無數毫末不效小便閟絶者三日夜腹滿益甚卻腰腹不痛唯糞門重墜甚而喊叫聲震中外坐婆二人或隔腹推胎或抱腰提舉或令浴腰以下交施手法不産面色青慘微喘嗚呼脈沉細而數衆醫危之皆辭去病家亦甘於死鄰坊有豐倉氏者曰片倉深甫有奇見試問之遂走使求治豫適不在弟子伊達生即往與救生加附子湯探宮視之得兒臀尻便初更致書告急豫外歸方食乃吐哺肩輿至則藤八再拜曰荊婦命有燒眉之急疊卵之危冀以先生靈得分娩則假令死亦幸耳豫診視曰汝所言實然雖吾術可以令娩婦命幾危然見有娩而生者未聞不娩而活者乃仿張子和一婦難産取稱鉤救之之法一下手忽然達生如風滅燈之速矣此時穢氣熏一室衆人一時兀兀欲吐蓋子死於腹中三日以上也使伊達生下胞衣留門邊乃作還元煎頻與之過一炷香便取下之直以敗絮塞育門防脫血次日喘鳴止而手足清冷脈沉微而結代豫慮正氣不能接續心甚危之尚依前方倍人參午後手足溫而好食粥飯自此日日精神旺而惡露冉冉下守用前方八日駸駸有生意唯左腳攣痛雙和湯加丹皮澤蘭調理數旬而全安如此之症若始用破血之劑決不能得生也初學者勿拘拘産後三日必下瘀血之說也二十三林重藏妻懷孕八月患小便滴瀝澀痛十餘日求治於余乃以石葦散加木通甘草數日而瘥而彌月分娩後惡露不下飲食無味熟寐汗出寸口虛數余曰不亟調治恐成蓐勞乃用內補建中湯加黃耆浮麥惡露自下二十餘日而脈和諸證始安矣此等證若局局然逐瘀血則去生遠矣二十四遠山君夫人年幾三十懷孕彌月方臨産多進催生藥及粥飯才産下而緣其子已殤悲傷大過忽發暈眩惡露下頗多吐飲食藥汁而胞衣不下穩婆按腹強令努力引胞莖而不出渠術極巧言曰強下之必有不測之變不如俟其自然下也自此昏暈往來脈沉細數或時沈伏乃延衆醫診視或曰脈沉細為虛寒若胞衣下必脫血乃以四味回陽飲參附湯交用之至次日前症不愈或曰夫人平素多鬱結用開鬱之劑則必可暈止而胞衣亦下也便用沉香香附枳實人參甘草之類猶不驗於是黃昏走使邀豫乃診視曰豫見與諸醫不侔今屢暈眩或脈沉伏者此以胞衣黏著於子宮底血氣不順流故也胞衣得下則必痊矣其下之豫在生産日行手術談笑可奏功今已失之遲則假令施術不得為必可以下也然為豫聽則當萬全者十之九矣親串議者嘵嘵曰何敢輕試手術乎寧耐靜俟毋涉險為也豫極言排之曰胞衣者乃血肉之渣滓子生地後以取下為佳何得與生産之譬諸瓜熟自辭蒂者同日而論哉用藥俟自下者是舍紀律而務野戰也若胞更不下二日則夫人之命必至顛巇舉族聞豫言大悚駭欲求豫治則又有畏前醫與坐婆之言躊躇不決漏已近雞鳴傍有夫人親家長臣某者聽豫之論而幡然有悟乃勸主人遂亟索豫劑又請手術便先與含陽散繼以盤珠煎而後按腹數回令離胞之黏著於子宮底者乃欲下而視肚帶則夫人之命必至顛巇舉族聞豫言大悚駭欲求豫治則又有畏前醫與坐婆之言躊躇不決漏已近雞鳴傍有夫人親家長臣某者聽豫之論而幡然有悟乃勸主人遂亟索豫劑又請手術便先與含陽散繼以盤珠煎而後按腹數回令離胞之黏著於子宮底者乃欲下而視肚帶則三裂如絲蓋坐婆強引而傷者爾豫百計殫力胎裂四而悉取下此時豫周身汗津津下衣里盡如灌水主人大喜曰微足下荊妻已為黃泉物必矣便與還元煎自此諸患脫然如失飲食日進數日而康寧如常二十五新輿坊木商婦患産前兩腳浮腫産後三日面手大腫小便短少大便下利日三四行時時嗢嗢欲吐如此者已三日延余治療診之脈沉緊余以為臨産飲食過飽因留停而胃中不和也乃用胃苓湯加神麯山楂子小便大利下利止惡露自下七八日而平復二十六陶器街一驛戶某妻年三十許稟厚豐肥有身其腹甚大方期月臨盆力息重沓腰腹烈疼晝夜不休坐婆二人按腹揉腰揮汗竭力徒增痛苦而不能達已歷四日求治於豫診之腹堅硬如石脈不甚數小便不通一晝夜豫雖知子死腹中然以形體未甚衰幸加陳痛一等或當娩也乃將大劑脫花煎水酒各二大碗濃煎與之而還矣服一劑盡猶不娩於是黃昏復走使邀豫豫便率弟子二人往則婦呻吟不絶口豫就診之則才舉聲曰腹痛不可忍願割腹出子則縱死無恨耳子憐其苦楚之切先煎人參三錢服之然後施回生術則漸而兒頭出人門便命弟子出體豫則出房措劑久之房內低語嘖嘖豫伺之謂弟子曰曷出體之遲緩也對曰小子等相與湊周身力於雙手而曳之然確然不移也於是豫復用手法齣兒右手然後令一人踞小兒伸兩腳入婦股間抵承臀尻而以綿衣包兒頭兩手緊握之別以綿布三四尺者纏縛兒頸二三匝而令門人及其夫緊捉其餘端豫則坐婦左傍隔腹推下胎便一齊併力引之才得娩矣豫即以冷水一呷送下桃花散一錢尋與參耆芎歸大劑及糜粥俟喘息虛里稍定命門人取下胞衣婦困憊太甚仰臥裀褥不能反側浹旬穢物漸漸下小水遺失不固守用前方精神清健飲餌日加頗能起床小水稍固惟腹滿不減惡露下少不大便十餘日臍下有一塊大如拳硬如石改用桃核承氣湯則日下結糞一二枚經五六日而惡露微微下凡用承氣湯十有三日塊散腹滿減而起居如常日唯小水時遺因與鹿蠣湯十餘日而全愈此等證若泥産後必逐瘀之說早與破血之劑禍不旋踵也初兒生地時見之形體肥大骨肉堅剛如生後百日已上兒宜乎其不能自娩矣嗟微此術不死何待二十七兒玉君夫人小産後經血不止五十日服芎歸膠艾湯溫經湯並不效請豫治之先灸關元三十壯將黃連解毒湯加艾葉蒲黃八貼而經血始止二十八新堀街和泉屋平吉妻娠而五月産戶瘙癢自將干萊卜葉食鹽熏洗之而差至七月腰以下有微腫而小便不利自此水氣漸漸充滿於周身兩足大瘇一脛之大幾如腰一指之大幾如股育門起脹幾如臀𨂂盩而不能立床仰臥於褥上而手足不得屈信諸友交治既三閲月不效迫彌月蓐母視之大駭曰若其如此而就臨盆必不能免艱産也病家惶懼急會親串評工於治水病者偶聞豫治晴陰街中島屋某腳氣腫滿乞豫求治診之脈沉弦渴而飲湯水豫乃以龍膽瀉肝湯加滑石豬苓外以管針刺陰門兩邊起水皰者各一痏清水出一掬計間一日復刺之而陰腫始消渴止小便頗多仍用前方去滑石豬苓加冬瓜子二錢六七日而小便大利水氣悉消起居如尋常孕婦唯心中懊憹二陳湯加薄荷梔子旋覆花用之三日而全痊經二日分娩如達子母無恙一醫謂豫曰曩我用真武湯數日毫末無效君有何所見用瀉肝湯而成功曷故哉豫曰陰門瘙癢者此肝經濕熱也豫治其本故取效而已二十九小松侯臣寺尾堅次內人年三十餘稟賦怯弱而多産懷孕八月患腰腳微腫纍日漸加期月易産後小便一日夜而一行不過三合許如此者十餘日腫脹日甚一日兩腳腫大不能屈腹滿如鼓呼吸促迫不能臥唯倚蓐坐者若干日諸導水消瘀之劑莫不概嘗罔有一應飲餌漸減小溲益短少渠自覺危急乃喚夫囑後事同僚海津元畏見而憐之乃宣言曰片倉深甫者名士也能細心察人病盍召彼令展盡底蘊遂延豫為治診之脈沉細而數顏色青慘腫氣充滿全軀光澤如瑩足心平氣息奄奄一語而三換氣矣豫曰法在不治然書曰醫而不起者有矣未有不藥而起者也我有一奇方所自制也其相應則效出人意表服之五六日內得見少效則必可圖生便用禹績湯二日而無應效因思雖大便自可腹滿尤甚此肝氣有餘而脾氣失化胃中生濁以不能滲入津液於膀胱故不驗也次日空心與犀角丸二錢同前藥吞之其夜大便三兩行色暗黑小便多前日二合半尚以前方加紫葳再送下丸藥則又下黑便三行小便利一升余大有生意也乃止丸藥自此小便利日一二升十有七日而浮腫盡消散而周身有皺紋乃以十全湯加人參數錢首尾一月半而健步如常矣三十丙辰杪冬初四黃昏豫從外歸則孰生遽出門迎接曰小傳馬街佛具匠妻疾危急甚因速先生診看者二豫直往其家則婦坐褥上床前積褥褥上安枕額伏枕上動搖腰臀汗出飛飛叫喚動鄰此以小腹玉戶俱脹裂痛劇難忍故也豫詢其病由則其諸父在旁口將言而囁嚅面渥赭而忸怩豫詰之曰今當令侄艱苦之甚不詳說病由何也夫雖聖智以望聞問切四者施治法焉豫素非有聖智惡得不問而盡病情哉請審具述焉諸父乃俯首徐應而將發言則病婦舉頭面色騂羞曰請勿高聲言矣便耳語曰先生諒無哂侄女生來子戶中有一物壅之其初以不害於小水父母不為深慮矣齡及至十七八月汛未行雖自憂之以隱疾羞澀於言特為經閉求醫治服破血之劑者積月纍歲絶無應效後來延數醫竊語之藥餌針灸無有虛日然又無小驗今年春秋已二十無緣於許嫁舉家憂之今之為夫者原近鄰一工匠渠不知其所以偶以豔書挑之遂互通情近以媒請娶因試送之今幾三越月往而未半月小腹漸漸脹起子戶一物亦脹益加十日而來小腹子戶俱疼痛劇則不可支或欲飛去壁上或欲求自盡飲食俱減不交睫者五日夜女科及外科見之不識為何疾各縛手辭謝聞先生能療怪疾救艱産尚矣特相迎以祈治劑豫竊以為是必陰挺疾可與蝟皮散瀉肝湯之類然不見其形狀則不可決矣便謂諸父曰雖隱處不忍視一匕落咽人命所繫不可不細察也遂諸父舉燈相與視之則如鵝卵者填滿於陰中其色淺紅按之劇痛乃以指頭入陰中四邊試淺深入僅六七分而指頭不進此症目之所稀覯而亦非陰挺疾豫俯思久之以為此生來子宮有一膜絶汛期道者偶得男子欲情數萌而不得遂經血動而不能漏充滿子宮而所致也今以陰之四邊指頭不進者考之則為皮膜無疑也即放膽以䤵針刺陰中填滿上八九分乘勢向下邊割之一寸許忽黑血如墨者漉漉為聲湧出三四升痛楚頓止而精神清快二十年來不具脫然復常後用理血之劑六日而全瘳次年正月汛行戊午三月生男三十一陶器街島屋作兵衛妻妊娠五月爾來大便泄瀉日兩三次延及臨月不止忽暈厥不省人事其夫灸內庭吐清水一盂許即醒繼腰腹疼痛於是惶急求治適豫以微恙辭謝又懇請云先生不能來使門弟子代焉因命診於一門人臨其往囑之曰凡胎婦方臨産暈厥者非其子死腹中則産後其婦必斃鮮有子母俱全者汝當須細察必莫倉皇診視以隕師名矣門人往診視顏色青慘飲食減半脈左右細弱以治中湯加當歸桂枝與之次早遽陳痛來舉男子訖而産婦忽暈倒昏憒煩躁呻吟不遑進藥而斃門人服豫之預察精確矣三十二一染匠之婦産後五日精神昏昧時又譫語飲食卻如無事人大便泄利醫為血迷治之延豫求治探其脈細數無根豫曰此正氣大虛心神放散而為錯語者於法為不治雖其善餐不足喜也辭去不藥明日下午遽煩躁呻吟而死三十三久保喜三郎君夫人妊已八月遍身浮腫至九月咳嗽氣湧心中懊憹粥藥入口即吐醫治浹旬纖毫罔效於是求療於余乃診視曰浮腫非産後不消須先治嘔也用清膈飲加知母山梔子七日而嘔止能食而期月分免後小水短少咳嗽益加余以為內經曰水病其本在腎其末在肺又曰急則治其標今咳嗽殊甚當舍其本而治其標也便與栝蔞湯三劑而小水大利五劑而咳嗽如失十劑而腫滿悉消自能轉側惟兩腳拘急不能立八珍湯加牛膝杜仲調理二旬而全愈三十四
