body:
  text: 卷二妊娠咳嗽第一妊娠咳嗽所感未審宜用潤肺湯此方孕中咳嗽之套劑也若感風寒喘嗽者宜小青龍湯腹中吊疼喉音不清者東鄰飲嗽心胸不利者錦囊百合散若嗽久不止痰喘滿悶者濟生百合散飲食失節脾氣不利肺又有客邪嗽吐痰與食俱出者以山楂飲加伏龍肝足成十品同煎功效尤勝孕中諸嗽措劑外宜兼用百花散嘗試有奇效潤肺湯家方治胎婦喘咳芎藭炒阿膠縮砂各一錢烏梅生薑紫蘇杏仁各五分上水煎溫服小青龍湯麻黃中芍藥中桂枝中乾薑中細辛中甘草下半夏上五味子上每服四錢以水二合煮取一合溫服東鄰飲治妊娠傷風咳嗽腹中吊疼痰壅喉音不清頭暈目眩人參白朮陳皮貝母茯苓桔梗紫蘇黃芩前胡粉草桑白皮各等分上水煎溫服生生子制此方治東鄰妻予取之常用姑名曰東鄰百合散錦囊治妊娠咳嗽心胸不利煩滿不食胎動不安百合紫菀麥冬桔梗桑白皮各一兩甘草五錢竹茹一團每服八錢水煎去滓入蜜半匙再煎一二沸食後溫服濟生百合散治妊娠風壅咳嗽痰喘滿悶百合蒸紫菀茸洗貝母去心白芍藥前胡去蘆赤茯苓去皮桔梗去蘆炒各一兩甘草炙五錢上每服四錢水一盞姜五片煎至八分去滓溫服不拘時山楂飲治咳嗽連聲吐痰與食俱出者山楂子上半夏上茯苓上木香中枳殼中陳皮中杏仁上細辛中甘草下每服四錢生薑五片水煎溫服百花散治婦人產中咳嗽黃蘗桑白皮用蜜塗慢火炙黃色為度二味各等分為細末每服一二錢水一盞入糯米二十粒同煎至六分以款冬花燒灰六錢攪在藥內同調溫服之子癇第二娠妊忽呼吸息迫痰涎潮搐目吊口噤角弓反張不省人事乍醒乍發又或仍不醒謂之子癇一名子冒又號痙病號風痙並外臺此症古論為風寒相搏發者以葛根湯羚羊角散主之然而試之取效甚寡而產論及翼論此病曰七情鬱結內火煽盛之所致也又平日多妒夫妻反目怒火熾盛因發此病其治法則一味熊膽參連湯第二和劑湯第五和劑湯及救癇術是也此與古論遠而實有奇效余亦別有發明凡此症已發則牙關緊閉不能灌藥雖施救癇術尚口不開者須以蘇合香圓熊膽各五六分溫湯化開乃以曲頭管入患者口內沿齒進頷里至牙齒盡處斜入管頭曲處於上下齦間右手持其管左手取前藥汁自含之自管之下口吹入患者之咽中吹盡一劑而牙關立開尋將單兵散一錢熊膽二三分薑汁湯和調頻與之更用鐵砂三黃湯若喉間喘鳴甚者兼用妙功救命散尤妙此余之所經驗也又有柴胡鐵鏽湯雙神元雄黃解毒丸等奇方臨症宜擇用焉此病雖謂子癇非胎離橫骨迫心也蓋症疝癖積鬱怒蛔蟲等宿疴因胎長大偶相激發者也故其胎臨產門而攻心下之狀正與腳氣衝心及癲疾發作之候不異今熊膽合蘇合香丸而用之者則假其芬芳香竄氣以開鬱閉通壅塞彼能導熊膽而折攻心之邪勢也較單用熊膽者其效甚捷曲頭管圖見卷六葛根湯小品方療妊娠臨月因風痙忽悶憒不識人吐逆眩倒小醒復發名為子癇葛根貝母去心木防己防風當歸川芎茯苓桂心澤瀉甘草各中獨活石膏碎人參各上上以水三盞煮取一盞服貝母令人易產若未臨月者升麻代之忌海藻菘菜酸物羚羊角散濟生方此方見諸方書今不載參連湯第二和劑湯第五和劑湯救癇術並見產論翼今不載蘇合香丸局方療傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖丁腫驚癇鬼忤中人小兒吐乳大人狐貍等疾蘇合油入安息香膏內薰陸別研龍腦研各二錢半白朮青木香丁子白檀硃砂研水飛烏犀角香附沉香蓽茇安息香研為末用無灰酒一合熬膏麝香訶黎勒煨各五錢上為細末入研藥勻用安息香並煉白蜜和劑每服旋丸如梧子大井花水溫冷任意化服四拆原方分兩而便調劑單兵散治腳氣衝心神方假以治子癇檳榔子一味極細末每服一二錢薑汁或童便和下鐵砂三黃湯治肝鬱盛怒氣逆躁擾或不省人事鐵砂上大黃黃連黃芩各中上以水一盞半煮取一盞溫服妙功救命散治痰涎壅盛咽喉鋸聲角弓反張鹿角灰四錢牛膽二錢麝香三分上鹿角極研以牛膽水化開灌前末攪和日曬乾入麝香再研細貯錫器聽用柴胡鐵鏽湯治癇症柴胡上鐵鏽上人參中茯苓中桂枝中蔚金中牡蠣中大黃中甘草下上水煎溫服雙神元治子癇神驗不可具述可秘可秘牛膽南星八錢雞冠雄黃四錢上二味極細末煉蜜丸如梧桐子大每服五十粒白湯送下解毒雄黃丸熊宗立治婦人中風卒然倒僕牙關緊急角弓反張口禁不識人並解上膈壅熱痰涎咽喉腫閉蔚金雄黃各二錢半巴豆去皮油十四個上為末醋煮糊丸綠豆大每服七丸熱茶清吞下吐出頑涎立蘇妊娠過期不產第三妊娠過期而不產者虞搏曰屬氣虛有熱武之望曰血虛氣滯余未知其說孰是然竊以事物之理推之凡果實成熟期至而自落矣其間又有過期而不落者此猶懷孕之過期而不產歟夫果實何故久留而不落乎懷孕何以過期而不產乎此皆常與變之分耳唯其臨產貴母氣充足故常宜服活血補氣劑今又舉虞武二氏之方以備參考虞摶云過期不產者屬氣虛有熱四物湯加阿膠白朮黃芩縮砂香附炒黑艾葉糯米主之武之望雲過月不產者四物湯加香附杏仁枳殼縮砂紫蘇用此補血行滯妊娠頓僕失踞胎動第四妊娠因頓僕失踞胎動不安者須先與砂糖湯而施按腹第五六之術以安胎矣若胎動轉上搶心短氣昏悶或腰腹疼痛有所見者大阿膠湯和榮湯蟹爪湯之類宜擇用若下血多者必致半產宜速隨臨產治法施藥大阿膠湯三因方云治妊娠不問月數淺深因頓僕胎動不安腰腹痛或胎奔上刺心短氣當歸中芍藥中地黃中阿膠艾葉上乾薑中炒黑川芎中甘草下上八味以水四合煮取二合服和榮湯胎動不安有所見者服之極驗當歸芍藥上桂枝阿膠蓮房炙黑各中甘草大棗各下上水煎服蟹爪湯蟹爪上阿膠上桂枝中甘草下上水煎服按腹術見產論翼妊娠嘔吐第五夫嘔吐之疾皆出於胃之不和是以有胃寒胃熱宿食痰飲氣攻等之翼寒嘔其聲低無臭氣而喜溫脈沉遲甚者四肢清冷半附理中湯二生散熱嘔胸中煩而其聲高肌熱盛而喜冷脈數有力竹茹湯茅根湯宿食嘔臭氣不可聞心腹絞痛脈必緊驢耳飲消導飲痰飲嘔唾沫稠黏心中懊憹或咳嗽高良薑湯旋覆半夏湯氣嘔則其人生平多妒或婢妾朝夕所為不愜己意或費思乎活計而膈間常不平者致胸滿膈痛是也四聖散加減七氣湯其他宜與惡阻條旁參互考焉半附理中湯治胃中虛冷嘔吐不止半夏上附子人參白朮乾薑各中甘草下上以水一盞半煎至一盞溫服二生湯治嘔吐不止及藥入咽即吐逆者生附子生半夏各二分生薑十片木香少上以水一盞半煎至一盞溫服竹茹湯見傷寒啟微上茅根湯見傷寒啟微上驢耳飲治飲食停滯嘔吐腹痛或眩暈頭痛者枇杷葉上半夏上薑製吳茱萸下桂枝下莪朮中木香下檳榔中上生薑三片水煎服消導飲諸飲食所傷此方悉能治之香附砂仁神麯麥芽山楂子乾薑蘭草各中木香下半夏上上生薑三片水煎溫服高良薑湯見傷寒啟微下旋覆半夏湯治痰飲在胸膈嘔不止心下痞硬者旋覆花半夏各上茯苓青皮各中上水煎溫服加減七氣湯見惡阻四聖飲治氣攻嘔吐諸藥不效者藿香良薑陳皮莪朮各等分上四味每服三錢熱湯浸去滓用此方五雲子所傳云予常讀藥方中藿香皆以蘭草換之功力殊優說見青囊瑣探宜參看妊娠小便不利第六婦人妊娠不得溺飲食如故煩熱不得臥而倚息者古名之轉胞曰胞系了戾所致腎氣丸主之唯胞系了戾說未穩獨陳無擇云妊娠胎滿逼胞胞者乃謂尿胞非血胞也故小便不利此說甚妙予常以補中益氣湯臨服入韭菜汁一小酒杯服訖施開閉術奏奇效或與開脬煎葵子散澤瀉散之類施整胎術亦可腎氣丸地黃上山茱萸薯蕷各中澤瀉茯苓丹皮中之中桂枝附子各下上八味末之蜜丸梧子大酒下十五丸令作湯用之甚驗補中益氣湯見諸方書故不載錄開閉術令患者橫臥床間醫以患者兩腳膝灣架於肩上將患者下身虛空提起搖擺數四俾尿脬倒上徐徐放下患者去衣不及小便箭射而出出孫東宿醫按予依此法屢奏效開脬煎周定治妊娠小便不通石葦去毛茯苓車前子冬葵子各等分每服五錢水二盞煎至一盞服冬葵子散濟陰綱目治孕婦轉胞小便不通男子亦效冬葵子山梔子滑石上之上木通中上水煎溫服外以冬葵子山梔子滑石為末田螺肉搗膏或生蔥汁調膏貼臍中立通澤瀉湯周新定方治妊娠小便不利神效澤瀉木通茯苓枳殼桑白皮檳榔葵子瞿麥等分上生薑三兩水煎服整胎術見產論翼妊娠浮腫第七妊娠兩腳腫者先賢謂之子氣或名脆腳或呼皺腳亦通身腫滿者名曰胎水曰胎腫曰子腫凡孕婦四五月以後兩腳微腫者十居其六七蓋以胎漸長脾氣失運行膀胱錯氣化而不能通暢津液因致腳腫木通散防己散雙全散宜擇用其最輕者雖不藥產後自消散若面目浮腫者全生白朮散分心氣飲腰腳腫者腎氣丸通身腫滿小便赤澀不大便者宜澤瀉散尚大便不通兼用龍飛丸以知為度又有腫滿之稍盛妊中不得消往往延產後而加甚者治法見產後宜參考焉若夫遍身洪腫甚者動輒子僵於腹中而產母亦殆可不畏哉又有一種挾濕毒而腫滿者此症初必有身發瘡疥或陰門瘙癢等候詳詢之果然宜用龍膽瀉肝湯木通散治妊娠有水氣兩腿手足浮腫木通香附子陳皮烏藥木瓜紫蘇各等分甘草減半上每服五錢生薑三片水煎溫服防己散治脾虛遍身浮腫腹脹喘促小便不利防己三錢桑白皮炒紫蘇莖葉茯苓各五分木香二分上生薑水煎溫服雙全散證治大還孕婦四肢腫宜護胎調養當歸白朮蒼朮防風木通茯苓豬苓桂枝名中甘草小上水煎服全生白朮散女科撮要治妊娠面目虛浮四肢腫如水氣名曰胎腫石頑云此方較澹寮五皮湯稍善中間惟白朮易桑皮而功用懸殊點鐵成金手也白朮上生薑皮陳皮大腹皮茯苓各中上各為末每服二錢米飲下分心氣飲局方治一切氣不化胸膈痞悶身面虛脹木通芍藥肉桂茯苓桑白皮腹皮半夏陳皮青皮甘草羌活各中紫蘇上每服三錢水一盞生薑三片棗二枚燈心五莖同煎至七分服腎氣丸加車前子牛膝亦可方見前澤瀉散婦人良方治妊娠遍身浮腫上氣喘急大便不通小便赤澀澤瀉桑白炒木通枳殼麩炒檳榔茯苓各五分上生薑水煎按證治大還加紫蘇莖葉龍飛丸見傷寒啟微下龍膽瀉肝腸見黴癘新書妊娠腹內鐘鳴第八孕婦腹內鐘鳴者先哲以為小兒在腹中哭者乃以鼠窟土麝香末溫酒調服或與黃連濃煎汁夫兒之在腹中胞衣裹胎堅固縝密無有針眼罅隙豈有揚聲之理乎子玄先生既撥其說而為大便燥結氣逆而鳴者余亦屢驗此症妊娠五六月以前腹中鳴者率皆屬疝瘕六七月以後者高處聳身取物胎為之失其所據腹內胎際作空隙而成聲也與症疝累積而空氣成蛙聲者正同宜施按腹術數遍更令婦匍匐而行房內一兩次胎復於本位而愈至於醫學正傳謂以兒脫所含之臍帶故哭妄誕極甚半產第九子玄先生常有病家自行墮胎藥不能產而來請者固辭而不往蓋其意一則憎其不仁一則恐我道之混墮胎家也是以其證候不詳載焉余嘗謂其不仁實可憎而彼亦不得已而為之若不為治則或致非命之死者亦可愍不得不隨其請而往救之凡寡婦室女及貧家多產而無力育之輒至三四五月就市中穩婆行墮胎挫藥法者如天受壯實者則不延醫師不語親戚乃偷產而恬然若在稟賦怯弱或大病後正氣未復者則往往殞命矣其證候惡寒戰慄如灌水雖蒙重被尚鼓頷不止須臾反煩熱如灼雖寒天欲得涼風或腰腹疼痛乍來乍止其來也如刺如割如絞如齧而流汗如雨呻吟不已或又渴好熱湯而陰門下瘀液臭汁雖症有輕重大抵不外於此宜用救生湯益母飲之類胎已下後牛膝散行瘀煎等並佳若壯婦則大黃牡丹湯若穢物頻下疲勞尤甚血熱熾盛口舌乾燥而脈細數者甚殆宜用大劑還元煎若誤用破血之劑則禍不旋踵謹之戒之一貧民妻妊娠方五月就市中媼行白牡丹術胎已下後血熱熾盛口舌乾燥渴好熱湯飲食不進既而昏冒不省人事命如風前燈求治於予脈之細數無力產屍下穢汁臭氣不堪聞予乃與還元煎日三四貼五日而神爽二十餘日而全愈救生湯當歸川芎牛膝桂枝各上炒乾姜人參各中上水酒各一盞煎一盞溫服或水煎另與溫酒半盞許亦可益母飲益母草上人參中白朮中炒姜中黃耆上炙甘草下當歸上上以水一盞半煎一盞溫服牛膝散見產後血暈大黃牡丹湯大黃中牡丹皮上桃仁上瓜子大芒硝下上以水二盞煎一盞去滓內芒硝再煎服之桂枝茯苓當歸湯桂枝茯苓牡丹桃仁芍藥當歸各等分上以水一盞半煎一盞溫服還元煎周定治小產後元氣困弱危極者應驗如神可秘艾葉阿膠各上白朮人參炒黑乾薑各中炙甘草下水一盞半煎七分去滓入童子小便半盞再溫頓服此方男婦大血崩下後精神困憊危嶮者用之返元氣於無何有之鄉炒劑也妊娠淋疾第十孕而患淋疾者其婦本有濕熱而受孕故下焦之運化失常度而隨胎漸長更釀成鬱熱也龍膽瀉肝湯地膚大黃湯葵子蜀黍湯芣苡湯之類令小便通利則濕熱自去而愈龍膽瀉肝湯見黴癘新書地膚大黃湯小品療妊娠患子淋地膚子上大黃知母黃芩茯苓芍藥木通升麻枳實各中甘草下上每服四錢水一盞半煎一盞溫服周按大全良方茯苓作豬苓葵子蜀黍湯家方療子淋小便澀痛又用男子奇效冬葵子蜀黍木通滑石各等分上每服四錢水一盞半煎一盞溫服芣苡湯種子編本無方名周定治子淋小便短澀車前子麥門冬當歸川芎木通滑石各五分細辛甘草各三分燈心一彈水煎服周按大全補遺安榮散即此方無車前子川芎而有人參用燈草各等分細末每服三錢煎麥門冬湯調下妊娠溏泄第十一泏注如水其色黃白無臭氣或水穀不化或腹攻刺作痛或時亦雷鳴脈沉弱者此寒瀉也宜丁附理中湯真武湯主之隨證加木香良薑砂仁桂枝之類若腹痛而下利一二行如水卻彈過響似欲出而肛門括縮又隱隱腹痛須臾欲出亦猶不出方其出則如射如傾或吞酸噫腐或溫溫欲吐不思飲食其脈緊弦者傷食瀉也宜治中湯若渴小便不利者胃苓湯並宜合九物飲或以內消散吞下紅丸子二三十粒亦可若脾氣大虛泄瀉久不止者宜遽用四逆輩加訶子罌粟殼烏梅肉豆蔻之類以兜住之又宜將四神丸茱萸斷下丸之類旦暮服二三錢若久泄不止加浮腫者往往不出妊中而斃其他泄瀉其因不一治法亦殊以載雜病試效略於此丁附理中湯見傷寒啟微嘔吐門真武湯附子茯苓芍藥生薑白朮各上上以水二盞煮取一盞去滓溫服加乾薑一大合最妙治中湯局方人參乾薑炮白朮各上甘草下青皮陳皮各上上以水一盞半煎一盞稍熱服胃苓湯大全良方治脾胃傷冷水穀不分泄瀉不止平胃散五苓散兩合者九物飲治諸飲食傷神效神麯炒麥芽山楂香附青皮乾薑炮木香厚朴檳榔各等分生薑水煎或合諸主方或為丸散兼用亦佳內消散治凡尋常飲食諸傷皆效香附砂仁陳皮半夏茯苓神麯山楂莪朮三稜乾薑枳實各等分上以水二盞煎一盞服紅丸子見前惡阻門四神丸破故紙十錢肉豆蔻麵煨五錢吳茱萸浸炒二錢半五味子五錢上為末生薑二十錢大棗二十五個煮熟取棗肉去皮和丸如桐子大每服一二錢空心術米飲下茱萸斷下丸治藏府虛寒腹痛泄瀉大效吳茱萸十錢炒赤石脂乾薑各七錢半艾葉炒縮砂仁肉豆蔻熟附子各五錢為末麵糊丸每服二三錢米飲送下此方不惟懷妊凡久瀉不止用理中之湯丸參附及諸止瀉之劑不效者用此尤神效今舉一案於後以示同志新石街里正某妻年三十許日溏泄六七行既五閱月尚不愈醫與參苓白朮散附子理中湯四逆湯等並不效形肉羸脫不能起床既在死法中友人橘尚賢勸余診之氣口脈沉細稍有神乃以茱萸斷下丸料作湯每服下四神丸五十粒用之六七日瀉利減其半十餘日而大便始見糞調理五十餘日而平復妊娠痢疾第十二凡妊娠痢疾三四十行已上者已六七日而不差動輒致墮胎非救之於早則不啻殞胎母命亦殆矣世醫拘有胎直用和平之劑遲緩延日疾勢轉劇往往致子母兩斃豈不悼哉凡痢疾初起二三日臍下小腹纏擾撮痛裡急後重頻欲登圊及去而所下無多既起而腹內復急不問白涕膿血赤白雜下紫黑褐色黃汁豆汁之異不論天賦之肥瘦強弱又不拘白為寒赤為熱之說其纏擾撮痛裡急後重者皆是腸間濕熱鬱滯之所致也及胃氣未損元氣未虧不可不行滯氣下濕毒也宜用五味蕩滯飲若嘔者加半夏或用黃芩加半夏生薑湯並旦吞下四寶丸十二粒晚吞下龍飛丸三十粒後一二日微利數十行中有快下一二行者此即藥有驗之兆也若未見其驗者以七味蕩滯飲增加前丸各五六粒尚不快利則與八味蕩滯飲龍飛丸加至五十粒數日後痢數減半丸數亦減三分之一若見虛候則宜益榮蕩滯飲逆挽湯之類若初挾外邪惡寒發熱頭痛者先與葛根湯五六貼而後依前治法矣凡痢疾在五六日間施前項治法則百發百中應效如桴鼓雖然無裡急後重腹痛亦甚輕或病日夕淹延見虛候者育腸煎益榮蕩滯飲桂附理中湯大斷下圓如神丸之類隨證擇用又有膿血痢初誤治而數日不差以黃連厚朴湯兼下蘗蒜丸而安者治妊婦痢疾之法拘拘於有胎而勿畏疏滌之劑經云有故無損不可不察也五味蕩滯飲治痢疾初發二三日不問赤白無表證者當歸芍藥厚朴檳榔各一錢甘草三分上以水二合煮取一合溫服或加黃芩亦可七味蕩滯飲用前方腹痛後重者此方主之枳實七分木香五分當歸厚朴各六分芍藥一錢檳榔七分甘草三分照前水煎八味蕩滯飲治下痢膿血裡急後重腹痛日夜無度即七味蕩滯飲加大黃六分四寶丹此方治痢神藥與龍飛丸旦暮兼用無不應驗丁子一錢胡黃連三錢巴豆霜一錢治巴豆霜見黴癘新書上三味為細末老米飲搗爛為丸如蘿蔔子大每旦服十二粒不知漸加至二十粒小兒五六粒育腸煎治虛弱患痢人參三錢白朮二錢半芍藥炒一錢半神麯炒七分升麻五分蒼朮一錢茯苓二錢桂枝一錢上作一服水煎後重加木香三分檳榔七分黃連七分澤瀉六分炙甘草五分防風一錢酒當歸一錢滑石炒五分益榮蕩滯飲家方治痢疾歷雜治數日不差氣血虛者當歸川芎芍藥地黃大黃人參白朮茯苓黃耆桂枝各等分甘草減半上以水二合煮取一合去滓溫服逆挽湯治一二日微熱泄瀉數十行而滯血裡急後重蒼朮肉桂生薑各一錢茯苓乾薑各八分枳殼人參各六分甘草二分上水煎裡急後重甚者加檳榔木香倍乾薑風證多者加酒製芍藥倍肉桂葛根湯治痢疾初起發熱惡寒頭痛脈浮數者葛根六分麻黃三分生薑四分桂枝三分甘草一分芍藥三分大棗二分上以水二合煮取一合去滓溫服宜服日夜三四貼桂附理中湯人參白朮炒乾薑炒肉桂附子各等分甘草炙減半每服七錢以水四合煮取二合去滓溫服大斷下圓治藏府停寒腸胃虛弱腹痛泄瀉全不思食附子炮去皮臍一兩細辛七錢半良薑一兩半肉豆蔻一兩面裹煨訶子煨去核一兩乾薑炮一兩半龍骨一兩半研赤石脂一兩半研牡蠣火煅一兩白礬一兩酸石榴皮一兩米醋浸一宿取出炙令焦黃上件為細末酸煮糊和丸如梧桐子大每服三十丸溫米飲下食前如神丸治赤白痢疾及泄瀉不止諸藥不效者阿片一錢黃蘗黃連木香麵粉各五分沉香乳香各三分上七味細末打米糊丸一粒重一分辰砂為衣黃連厚朴湯療妊娠腹痛下痢膿血不止黃連八分厚朴制阿膠當歸各六分艾葉黃蘗各四分乾薑五分上為細末空心米飲調下方寸匙日三服又水煎服蘗蒜丸療妊娠臍下刺痛大便白晝夜三五十行黃蘗厚者蜜煮令焦大蒜煨令熟爛去皮上以黃蘗為末研蒜作膏為丸如梧子大空心粥飲下三十丸日三服妙周按產論青陽丸即此方無大蒜臟燥第十三婦人妊娠無故慘慼悲傷淚下不止如有憑數欠者古謂之臟燥即以甘麥大棗湯主之若心中虛悸煩悶氣逆者宜用淡竹茹湯兼用震靈散尤妙甘麥大棗湯方見產論淡竹茹湯淡竹茹上麥門冬小麥茯苓半夏各中甘草生薑大棗各下上八味以水二合煮煎一合溫服若心虛驚悸甚者加人參以安定精神震靈散茯苓十錢辰砂五錢上極細末每服七八分白湯調下妊娠數墮胎第十四有婦人孕三四月或八九月頻墮胎蓋夫妻一精氣清冷則兩精交暢雖已成胎以其不純粹不能持期月而輒墮矣譬諸移果樹於瘠地雖能結實竟不熟而皆落也余所知三兩家懷孕八月而墮胎者皆六七產而產前後無有他故此等證皆是由心脾二經不足所致也後遇此症博索方於前哲書籍適用孫文垣補天手飲數月得月足而產好兒初學者宜試之矣又黃耆散白朮丸山藥丸加味四物湯千金保孕湯等隨症可擇用凡小產雖獨系婦人怯弱亦有男子精氣清冷而不能保孕者則求嗣者宜夫妻俱服藥餌也如婦人有症痼蓄瘀害娠者須祛逐之宜大黃茯苓丸牛膝散應效丹之類補天手飲治懷孕不能養胎數月而墮胎酸棗仁遠志茯神各一錢白朮二錢甘草五分當歸枸杞子芍藥各一錢五分生地黃八分艾絮二分龍眼肉五枚上十一味以水四合煮取二合去滓溫服黃耆散治婦人懷胎數落而不結實或冷或熱百病之源人參黃耆甘草炙白朮川芎地黃當歸乾薑吳茱萸各等分上搗散清酒服一匙半日再服加至兩匙為劑白朮丸古今錄驗療妊娠養胎白朮川芎各四分阿膠地黃當歸各一兩牡蠣二分川椒三分上為末煉蜜為丸如梧桐子大空心米飲吞三四十丸酒醋湯亦可山藥丸簡便方治頻慣墮胎三四月即墮者杜仲八兩糯米煎湯浸透炒續斷二兩酒浸焙乾上末以山藥五兩為末作糊丸空心米湯下加味四物湯胎產須知治胎氣不固常小產者四物湯加炒阿膠炒黑香附白朮黃芩砂仁糯米千金保孕湯玄珠治氣血不足每至三四月而墮人參杜仲白朮黃耆歸身白芍阿膠續斷砂仁甘草糯米五十粒上制水煎食遠服如肚痛加艾葉香附大黃苓茯丸治有症痼害妊娠者大黃茯苓桂枝芍藥桃仁牡丹皮各等分上六味細末煉蜜和丸如兔屎大每日食前服一丸不知加至三丸應效丹治血塊在小腹者乾漆牡丹皮大黃各一兩莪朮五錢上細末醋糊丸如梧子大溫酒吞二三十丸妊娠心腹腰背痛第十五胎前產後心痛用川楝茴香炒各三錢鹽炒艾葉錢半水煎服之神效茯苓厚朴湯治妊娠卒心痛氣欲絕當歸川芎茯苓厚朴制各等分每服五錢以水三合煮取一合以延胡索末一錢和調頓服白朮湯治妊娠卒心痛欲死不可忍者白朮五錢芍藥四錢黃芩二錢上以水六合煮取二合半分三服半日令盡當歸芍藥散治妊娠腹中絞痛心下急痛及療產後血暈內虛氣乏崩中久痢芍藥四錢當歸白朮各二錢澤瀉茯苓川芎各一錢上為末每服二錢食前溫酒調服茱萸當歸湯治冷氣忽中心腹痛如刀刺當歸吳茱萸人參川芎茯苓桔梗各三錢芍藥厚朴各二錢每服五錢以水二合煎取一合溫服氣下即安草豆蔻散治妊娠心腹常痛吃食減少四肢不和全不入食草豆蔻橘皮地黃白朮各五錢川芎三錢二分當歸炒桂枝乾薑木香各二錢半上為末每服四錢水一盞棗二枚煎至六分熱服當歸散治妊娠中惡心腹㽲痛當歸丁香川芎各三錢青皮二錢吳茱萸炒黑一錢上為細末無時溫酒調一錢杜仲散療妊娠腰疼痛不可忍或連胯痛杜仲四錢阿膠炙防風狗脊川芎芍藥細辛五加皮萆薢各三錢杏仁炒一錢上每服五錢以水二合煮取一合去滓溫服秘方鹿角散治妊娠腰痛如折不能轉側鹿角酒浸燒三次為末每一錢溫酒調下又縮砂炒末溫酒下亦妙紫蘇飲治妊娠背痛者是氣滯也方見胸滿補中益氣湯加續斷杜仲治妊娠腰腹背痛因勞傷損動痛不止多動胎氣者八珍湯加阿膠艾葉黃耆腰痛甚者腎虛極也其胎必墮急與此方已上二方見諸方書今不載錄阿膠散治妊娠胎動腹中㽲痛不思飲食白朮茯苓川芎阿膠各三分當歸炒陳皮各三兩甘草一分上每服三錢水一盞姜三片棗一個煎至七分服妊娠誤服毒藥傷動胎氣第十六奪命丸治婦人小產下血至多子死腹中其人憎寒手指唇口爪甲青白面色黃黑冷汗自出或胎上搶心茯苓桂枝桃仁牡丹皮芍藥各等分上為細末以蜜丸如彈子大每服兩丸淡醋湯嚼下妊娠因頓僕或因毒藥胎動不安腹滿腰痛或有所下者芎歸膠艾湯加黃耆甘草主之
