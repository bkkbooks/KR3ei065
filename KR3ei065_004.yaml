body:
  text: 卷四産後咳嗽第一咳嗽之病雖其本不一皆是肺家病産後患之者宜先與丹參湯功效尤勝若惡露下少而咳嗽不已者宜二母飲嗽而牽引脅下臥則喘咳益甚者必有伏火瓜蔞湯加知母黃芩各八分感風寒咳嗽喘滿痰涎壅盛者宜旋覆花湯已試之驗丹參湯丹參一錢百部根桔梗各六分百合茯苓各八分五味子五分桑白皮一錢上以水二合煮取一合溫服二母散治産後惡露上攻咳嗽不已知母貝母茯苓人參各五錢桃仁杏仁並生去皮尖各一兩上每服五錢水煎溫服瓜蔞湯赤水醫案治産後咳嗽痰不易出左脅疼痛內熱氣壅不能伏枕者瓜蔞仁六兩桑白皮杏仁半夏桔梗紫蘇子枳殼各一錢上水煎溫服旋覆花湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅盛坐臥不寧旋覆花芍藥前胡半夏甘草五味子荊芥茯苓杏仁麻黃各等分上銼每服四錢水一盞半薑五片棗一枚煎至七分去滓食前溫服熊宗立云産後咳嗽此方最良元周以此法治若干人皆驗産後寒戰交牙第二産後患寒戰交牙者其人瘀血不得下而發宜將折衝飲行瘀煎之類點服獨行散一二匙若惡露下過多或難産而用力太甚才分娩而發者與還元煎疲勞甚者附子湯人參湯之類宜擇用併兼用奪命散最妙折衝飲見産論行瘀煎見血暈還元煎見半産附子湯聖濟附子人參生薑大棗各等分上水煎溫服人參湯人參二三錢以水二盞煮取一盞溫服奪命散大全良方治産後血暈血入心經語言顛倒健忘失志及産後百病沒藥血竭各等分上細研為末才産下便用童子小便細酒各半盞煎一二沸調下二錢良久再服産後崩漏第三産後惡血崩漏不止者當速施遏崩之術令産戶緊閉乃與膠艾湯或惜紅煎兼用三聖散獨黝散之類若不止者宜還元煎凡血症用理血之劑而不效者非理氣之藥則難收效不可不知也又收血理氣之藥並不效者卻宜涼血之劑三黃炙艾湯尤神效又古方有瑞蓮散實産後血崩之神藥也膠艾湯一方加乾薑一兩芎藭阿膠甘草各二兩艾葉當歸各二兩芍藥四兩乾地黃六兩上七味以水五升清酒五升合煮取三升去滓內膠令消盡溫服一升日三服不差更作惜紅煎治婦人經血不固崩漏不止及腸風下血等證白朮山藥炙甘草地榆續斷炒芍藥炒五味子荊芥炒烏梅水一鍾半煎七分食遠服如火盛者加黃連黃芩獨黝散此方不獨治經血不止諸血用之悉驗蓮房不拘多少燒存性細末每服一二錢湯子送下遏崩術見産論翼三聖散見産前吐血還元煎見半産瑞蓮散治産後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸官桂各十錢檳榔二枚川芎七錢半鯉魚鱗炒七錢半上為細末每服三錢煨生薑酒調如未止更進一服産後兒枕痛第四一名産枕痛一名血枕痛産後臍下疼痛其痛一陳來而止後來者名曰兒枕痛此瘀血將出而為痛者其實佳兆也然産訖則忽腹中空虛是以産婦多不堪其痛宜用破血之劑行瘀煎獨行散延胡索散熊氏延胡索湯之輩宜擇用若産後不大便數日而小腹疼痛者宜兼用龍飛丸或用四物加大黃湯木直煎之類若初瘀血頗快下大便亦如故而腹中㽱痛者則屬疝加味建中湯加味通氣湯之類並有奇效永類延胡索散治産後兒枕腹痛效延胡索當歸各一兩琥珀蒲黃炒各一分芍藥五錢肉桂三分紅藍花二錢上為末童子便合溫調三錢食前服熊氏延胡索湯治兒枕痛不可忍者甚效當歸桂心延胡索各等分上水煎服舊為散周常加山楂子等分為湯用甚效行瘀煎見産後獨行散見血暈龍飛丸木直煎並見傷寒啓微四物加大黃湯即四物湯加大黃加味建中湯芍藥上桂枝中甘草下木香下吳茱萸茴香中生薑中大棗中上八味水煎溫服加味通氣湯治小腹及腰疼甚則肛門窘迫不可忍茴香烏藥當歸芍藥香附各上山楂子陳皮茯苓白朮延胡索吳茱萸檳榔澤瀉各中木香中下甘草下上十五味水煎溫服産後發熱第五産後發熱者多因血虛而陽無所依浮散於表也勿妄為外感施治宜七味益母飲加尿瓦一二錢內有四物補陰益母行血炮薑辛溫從治而能收浮散之陽以歸於陰若氣血俱虛而惡寒發熱渴而煩躁者十全散熱甚者倍桂加炮薑熟附子若夜熱甚小腹及腰痛者與雙和湯調中益血則熱自解若由外感而發熱頭痛頸項強無汗脈浮而有力者宜竹葉湯或熟料五積散又壯熱煩悶乾嘔口燥吟呻喘滿脈實者宜用黃連解毒湯七味益母飲益母草上當歸川芎芍藥乾地黃乾薑炮各中甘草下上七味水煎溫服十全散雙和湯並見黴癘新書竹葉湯黃連解毒湯並見傷寒啓微制尿瓦法安土器於廡下尿之三百日便取起打破再炭火中燒赤置地上一宿極細末聽用豫往往以此易用於童便熟料五積散見産要産後飽悶第六惡露不下而飽悶者瘀血上逆也宜行瘀煎若腹中有塊上衝欲吐者與九聖飲兼進白丸子若塊在小腹不散者琥珀黑龍丹若胸膈飽悶心下痞硬或肩背疼痛有寒熱者屬氣滯宜指迷七氣湯一貼正氣天香湯一貼相和用之九聖飲治腹中有塊溫溫欲吐或上衝心下痛甚者半夏茯苓各上肉桂乾薑橘皮香附山楂莪朮各中甘草烏梅各下上十味水煎溫服白丸子半夏醋煮乾茯苓各十錢上細末以生薑汁作薄糊丸梧子大每三十粒溫水下行瘀煎見産後黑龍丹見言語錯亂指迷七氣湯治胸膈飽悶心下痞硬青皮陳皮桔梗莪朮桂枝藿香益智各十錢香附十錢半甘草三分加半夏三分上每三錢水一盞薑四片棗二枚煎七分服産後乳結痛第七婦人産後血氣盛而乳房作脹乳頭縮退兒不得飲余乳蓄結脹痛憎寒發熱者須先令細心人微微揉之柔和卻吮乳汁通之然後宜與麥芽煎或玉露散外將百草霜水和勻塗乳房尤神驗麥芽煎麥芽炒熟五錢上水煎溫服立消此薛己方玉露散良方治産後乳脈行身體壯熱疼痛頭目昏痛大便澀滯悉能治之涼膈壓熱下乳人參茯苓甘草各中桔梗川芎白芷各上當歸芍藥各下上為細末每服三錢水一盞煎至七分溫服如煩熱甚大便祕者加大黃産後語言錯亂第八産後談笑不止口或錯言妄語如見鬼物或欲逾牆上屋者此敗血凌心也多死與黑龍丹萬死中求一活若唯煩亂者失笑散加鬱金各等分黑龍丹良方治産後一切血疾産難胞衣不下危急惡疾垂死者但灌藥得下無不全活神驗不可言當歸五靈脂川芎良薑熟地黃各十錢上細銼以沙合盛封口鹽泥固濟以文武火煆一炷香放涼處退火毒取開看成黑糟色乃取出細研入後藥百草霜五十錢硫黃乳香各一錢半花蕊石琥珀各一錢重上共前煆過藥研勻酢糊丸彈子大每服一丸用薑汁好酒童便半盞將藥一丸於炭火中燒淬入酒便內調化頓服立效前哲既稱讚此方之神驗余屢試之實不虛失笑散局方蒲黃炒五靈脂各等分為末釅醋調二錢服産後嘔吐第九産後嘔吐者宜先用半夏竹茹湯若緣惡露不行者二陳湯加當歸莪朮肉桂乾薑若傷食胸腹㽱滿者六君子湯加木香厚朴或二陳湯加丁子縮砂若不效更加人參炮薑澤蘭蘭草若虛寒脈沉微者理中湯加丁子蘭草若敗血散於脾胃腹脹嘔吐者抵聖湯加肉桂穿山甲其效尤捷半夏竹茹湯半夏竹茹茯苓伏龍肝各錢上水一盞半入生薑五片煎取一盞服二陳湯六君子湯理中湯見産後抵聖湯見産後腹滿産後淋疾第十産後小便淋瀝澀痛者此瘀熱在膀胱之所致也宜用開閉煎或滑石散石葦湯並效若痛甚者宜緩痛煎若惡露下少臍下有堅塊者此舊瘀血礙尿道之所致也將行瘀煎加葵子滑石車前子甚效又有子宮下墜壓尿道而致癃閉者輕者終日而始通重者一日夜而自利此以子宮漸復本位也若倘不得通小腹脹滿者便宜施泄閉術隨手即效尋宜用五聖飲又未産前不大便五六日延産後倘數日不通而小便癃閉者此燥屎填滿於大腸小腸為之被窄狹之所致也宜木直煎或用開閉煎吞龍飛丸三十粒未效者不將芒硝滋之則不可潤下飲每每奏奇效開閉煎家方治男婦小便淋閉之妙方夏枯草白茅根各上莽草瞿麥茯苓冬葵子西洋參滑石各中甘草下上水煎溫服滑石散千金治産後淋滑石五錢木通車前子冬葵子各四錢上為末以漿水調服方寸匙石葦湯家方治小便淋瀝陰中痛石葦上瞿麥中車前子上葵子中木通中甘草下茯苓中上水煎服此方治男子膿淋其效如神緩疼煎家方凡諸淋小便澀痛不可忍者用之功效如神當歸中川芎下芍藥中地黃中焰硝上甘草上車前子上上水煎服行瘀煎方見産後五聖飲家方此方治諸淋甚妙萍蓬根四錢車前子蜀黍蘇木甘草各二錢上以水六合煮取三合去滓溫服可斷鹽味木直煎龍飛丸並見傷寒啓微潤下飲治小便淋瀝澀痛大便祕結大黃芒硝當歸地黃芍藥各等分上水煎溫服産後腫滿第十一凡胎前腰腳微腫煮十居六七然此症雖不用利水之劑過産後十餘日則自消散若小便澀滯漸腫滿者此濁液流入經絡留淫日深而散漫偏身也宜橐吾飲其人若小腹有塊堅硬唇口乾燥惡露下少者紫葳蘇木湯千金牛膝湯之類擇用若腫中有凝結者澤蘭湯若腫脹稍硬腰以下更甚而無光澤小便短少者六皮煎用之不效而腫勢日盛者禹翼湯尤神效若服諸導水消瘀藥而並不效腫脹充滿腹如抱甕手足似腰大皮膚光澤如瑩者非用禹績湯則決不能取效此方實出於豫之心裁而救危起廢之神劑也若每欲小便必大便不利者甚治難宜用茯苓湯加琥珀一錢若腫不甚涉遍身而飲食氣宇如故或時肩背拘急或又疼痛者宜利氣之劑集香湯尤妙若面獨腫而久不消者分心氣飲或獨味紫蘇湯若面無血色腫狀如熟李大便滑者下焦虛琥珀湯加味腎氣丸料之類宜選用焉其他有腳氣濕毒敦阜等腫而見證多端治法各異焉不能備録於茲詳載在腫脹彙編橐吾飲治産後浮腫當歸芎藭芍藥茯苓各一中合桑白皮一大合甘草一小合橐吾莖葉三大合上水煎服次日加橐吾四錢又次日加六錢更加南天燭實尤妙紫葳蘇木湯治惡露不盡産後浮腫者紫葳即凌霄花葉一大合半冬瓜子一大合蘇木當歸川芎茯苓牡丹皮各一中合甘草一小合上以水一盞半煮取一盞去滓溫服澤蘭湯治産後四肢腫滿腫中或凝結有塊而不食者澤蘭防己各上枳殼琥珀桂心商陸半夏歸尾莪朮茯苓麥芽桃仁神麯桑白皮各中上生薑水煎食遠服大便祕者加大黃千金牛膝湯見血暈禹翼湯鶴陵定治産後腫滿皮膚無光澤腫稍硬者桑白二大合防己一大合半茯苓豬苓各一中合黑豆一大合澤蘭一大合半上以水一盞半煮取一盞溫服日與二三貼若氣不和加紫蘇一大合禹績湯鶴陵定治遍身腫滿皮膚光澤如瑩小便不利諸藥不能療者西瓜皮赤小豆冬瓜內蒸曬乾各二大合冬瓜子西瓜子豬苓茯苓各一中合大腹皮冬瓜皮各一大合半海金砂一小合上以水一盞半煮取一盞溫服宜進日二貼以上二方余之所創裁而治産後腫脹之神方也余歷年試用救危起廢者不勝枚陳矣夫古人作詩數千首其間一二自有令人感動之合作余之立此方亦自得配合之宜者也分兩必不可加減奇效靈驗難以具述茯苓湯楊氏治脾氣不實手足浮腫小便祕澀氣急喘滿白茯苓澤瀉香附子大腹皮乾生薑橘紅桑白皮細銼炒各等分每服五錢水一盞半煎至七分去滓溫服不拘時候集香湯直指凡腫脹先用諸香以透徹關絡則小便易利沉香丁香各二錢木香青木香藿香川芎檳榔赤茯苓枳殼甘草炙各三錢乳香錢半麝香一字別研上粗末每二錢半薑三片紫蘇三葉空心煎服分心氣飲紫蘇二大合大腹芍藥木通半夏茯苓桑白皮炒橘皮青皮羌活甘草燈草各一中合生薑三片棗二枚水煎溫服琥珀湯治脾腎虛寒小水不利遍身腫滿或咳喘者琥珀人參白朮一大合茯苓一中合桂枝附子乾薑砂仁一小合半陳皮破故紙桑白皮童子小便浸炒各一中合上水煎食遠服加味腎氣丸即八味丸加車前子牛膝加味六皮煎大腹皮上桑白皮上五加皮中茯苓皮上生薑皮中木瓜中橘皮中薑黃下燈草上上九味以水二盞煮取一盞溫服産後玉門不閉第十二産後玉門不閉者因難産強努力或死胎不娩以回生術救之後玉門錯和氣血失運行而不能括縮致不知小便漏出也以十全散加五味子外石灰湯浸患處又努掙太過陰肉下脫內出者硫黃洗方石灰韭菜洗方並有奇效石灰湯石灰一升炒令能燒上投熱湯中攪調俟適溫乃取澄清移大盆內坐湯中以浸玉門斯須平復如故此方原肘後方十全散見黴癘新書産後陽氣虛寒玉門不閉用陳飛霞石硫黃海螵蛸五味子上等分共為末摻患處日三易同上治産後玉門不閉陰戶突出方陳飛霞石硫黃三錢菟絲子吳茱萸各二錢蛇床子一錢五分水一大碗煎至半碗頻洗自收治産後子宮墜出戶外數日不收用未經水石灰幹一塊重二三斤者又以韭菜二三斤煎湯置盆中將石灰干投入灰開湯沸聲盡乃濾去灰帶熱坐於盆上先薰後洗即以熱韭菜於患處揉抑一日洗一二次以消軟收入為度赤水玄珠産後口舌病第十三産後口舌糜爛者已投尋常瀉火清熱劑而不效者往往綿歷纍月不差矣前哲方書率皆略之不載豫二十年來每於此證求治法於方書口舌門屢試數方多不得效竊恨小恙之難醫焉近有一二患者已三閲月不差於是覃思焦神略有所悟乃制方與之七八日而得全愈後試之數人應效如桴鼓凡舌上舌傍如無皮狀其色紅赤飲食刺舌者此皆血分濕熱之所致也宜令服當歸飲而傅間碧散若咽喉生瘡舌上有白胎久不愈者屬淡飲加味導淡湯主之若咽喉口舌腐爛者宜薔薇遺糧湯對喉癬湯當歸飲當歸川芎芍藥地黃何首烏荊芥防風黃耆各五分甘草二分蒺藜子七分上水煎溫服間碧散鶴陵定治産後口舌糜爛神效可祕可祕淡竹干燒存性五錢人中白瓦上燒以變白色為度四錢上二味極細末傅舌上日五六度加味導淡湯陳皮枳實半夏茯苓南星各上甘草下竹瀝一大蛤殼白芥子中上七味水煎入竹瀝更溫服薔薇遺糧湯喉癬湯並見黴癘新書産後煩渴第十四産訖面色青慘汗出而煩渴不止者此因驟脫血也此證多難治治法見第一卷若産後二三日發熱頭痛脈浮數而煩渴者宜竹葉湯若惡露下多發熱煩渴者集驗栝樓湯若吐利腹痛手足清冷煩渴者聖惠白朮散隨症宜擇用集驗栝樓湯療産後血渴地黃中栝蔞根上土瓜根上甘草下人參中麥門冬中大棗中上水煎服産寶無地黃麥門冬有牡蠣粉等分聖惠白朮散白朮橘皮人參麥門冬乾薑炮各上甘草中生薑下上水煎服竹葉湯見傷寒啓微産後自汗盜汗第十五産後虛汗不止者經效黃耆湯主之若不效者宜投黃耆建中湯加牡蠣浮麥麻黃根若絶汗如雨手足清冷者危如風前燈當用參附耆蠣湯於百死中求一活凡自汗盜汗證以五倍子細末酢和調貼臍中止汗甚妙用溫粉亦宜方見傷寒啓微經效黃耆湯治産後汗出不止黃耆上白朮牡蠣茯苓麥門冬防風地黃大棗名中上以水二合煮取一合去滓溫服黃耆建中湯芍藥上黃耆中桂枝中甘草中生薑中大棗下膠飴上上六味以水二合煮取一合去滓內膠飴更上微火消解溫服參附耆蠣湯家方人參黃耆附子牡蠣各等分上作大劑以水二合煮取一合溫服産後脅下疼痛第十六産後惡露不盡脅肋疼痛者宜先與豁脅散此方不效仍引脊膂攣急者此血氣不和之所致也宜枳殼煮散當歸柴胡湯柴胡疏肝散之類若寒熱頭眩脅脹作痛或身疼者此肝腎二經氣血虧損者宜用補肝散若脅滿氣急目昏濁視物不明其脈遲弱者檳榔湯主之豁脅湯治因瘀血留滯脅肋疼痛神效芍藥延胡索肉桂牡丹皮各中香附子上上五味水煎溫服枳殼煮散本事方治因悲哀鬱結血氣不和兩脅牽痛筋脈緊急漸至脊膂攣急枳殼炒黃細辛桔梗防風川芎各上之上葛根甘草炙各中生薑下上每服四錢水一盞半煎七分服當歸柴胡湯治産後血氣脅肋脹痛當歸上芍藥桔梗檳椰枳殼各中桂枝柴胡青木香中之下上以水二合煮取一合服本出經效方柴胡疏肝散柴胡陳皮醋炒各上川芎芍藥枳殼麩炒香附子各中甘草下上每服四錢水煎服補肝散滑氏治肝腎二經氣血虧損脅脹作痛或寒熱頭眩身痛當歸山藥黃耆炒川芎山茱萸五味子木瓜各上熟地黃白朮各下酸棗仁炒獨活各中大棗下上每服五錢水煎服檳榔湯檳榔附子母薑各上茯苓橘皮桂心各下桔梗白朮各中上水煎溫服若氣喘者加半夏上川芎中甘草下産後大便閉結第十七産後大便當六七日而來若過之不通腹痛腰疼或腹滿者宜調道飲若猶不利者兼吞龍飛丸二三十粒至大段閉結者不以芒硝潤導不效宜桃核承氣湯調道飲聖惠治婦人産後大便不通當歸川芎防風枳殼制各上甘草炙上每服五錢用生薑三片棗二枚水煎服龍飛丸見傷寒啓微桃核承氣湯桃仁上桂枝中芒硝中大黃上甘草中上以水一合半煮取一合溫服産後下利第十八産後下利不止者不問何證宜先與芍藥香附湯兼用青陽丸若不止者宜茯苓建中湯每服點服燒黑魚狗末五分若腹痛者當歸湯調中湯量證擇用滑瀉不止者神效參香散主之芍藥香附湯治産後下利上氣足冷時發熱腸鳴切痛芍藥香附各上乾薑中甘草下丁子下砂仁中一方加黃連治下利不已乾噫食臭上每服四錢以水二合煮取一合溫服青陽丸方見産論茯苓建中湯即小建中湯如茯苓上當歸湯千金療産後下利腹痛當歸龍骨各上乾薑甘草炙附子炮熟艾各下白朮中芎藭上之上上八味水煎溫服調中湯治産後腸胃虛怯冷氣乘之腹脅刺痛洞泄不止良薑當歸酒浸桂心芍藥炒附子炮川芎各上甘草中上為粗末水煎熱服神效參香散治産後脾胃虛寒泄瀉洞下及痢疾日久積已盡滑瀉不止此收澀如神人參木香各二錢肉豆蔻煨茯苓白扁豆各四錢陳皮罌粟殼去蒂穰醋炙每一兩上為細末每服一錢匙清米飲調下食遠服産後遺尿第十九鹿蠣飲鶴陵定治産後遺尿不知出及小便頻數芍藥黃耆牡蠣益智鹿茸人參各等分大棗減半上七味水煎溫服治驗在卷五宜參看喬一方醫綱婁英曰町婦人産後尿不禁面微浮略發熱於午後此膀胱為坐婆所傷黃耆當歸芍藥各一錢半白朮一錢人參陳皮各五分甘草炙些上水煎熱飲之桑螵蛸散千金翼治産後小便數及遺尿桑螵蛸三十個炒鹿茸酥炙黃耆各三兩牡蠣煅赤石脂人參厚朴各二兩上為末空心粥飲調下二錢外臺方無厚朴石脂有甘草生薑産後腹脹第二十産後腹脹而嘔吐心下痞硬或腹痛者由飲食停滯宜消導飲加半夏一二錢若不嘔吐而腹脹滿小腹疼痛大便難者宜木直煎若無腹痛痞硬等證唯腹脹滿悶嘔吐不定者敗血犯脾胃也抵聖湯加穿山甲肉桂極妙又惡露下少腹脹滿大小便祕澀者宜忍冬飲消導飲方見嘔吐木直煎方見傷寒啓微抵聖湯治婦人産後腹脹者尤神效赤芍半夏澤蘭葉人參陳皮各分甘草一錢上每服一劑用水一碗生薑焙乾半兩煎至半碗去滓分熱三服忍冬飲當歸川芎芍藥木通赤茯苓蓽澄茄忍冬各等分每服五錢水煎溫服此方又治婦人月經不來二三月腹脹滿大小便祕者忍冬消腹脹之神藥人未知之産後痿躄第二十一産後之痿躄多患水腫痢疾等證之後血液耗亡筋失滋養者間致此證也大抵不歷百日以上若半歲則難得功矣所以然者因産亡血因疾損津液也健腳煎續斷丸思仙續斷丸之類宜擇用健腳煎鹿茸酒洗炒續斷當歸酒洗芎藭芍藥熟地黃牛膝酒洗杜仲炒去絲各等分上八味水煎服續斷丸續斷二兩破故紙酒炒牛膝酒洗木瓜酒洗萆薢酒洗杜仲去粗皮切片酒洗炒去絲各一兩上為細末煉蜜丸如梧子大每服六七十丸空心酒下思仙續斷丸萆薢四兩防風去蘆薏苡仁思仙木即杜仲銼絲斷各五兩牛膝酒浸續斷羌活生地黃五加皮各一兩上為末酒三升化青鹽三兩木瓜半斤去皮子以鹽湯煮木瓜成膏杵丸如梧桐子每服五十丸空心溫酒送下余作湯用之亦效産後陰門腫痛第二十二産後陰門腫痛者初産婦常多而纍産者小矣初産多者蓋方分娩之際兒頭擦破陰門也如纍産者既以為熟路不致破傷也然難産而娩者雖經産者往往致損傷率皆陰肉起脹欲小便則陰中疼輕者取蛤煮汁薰洗擦枳殼散重者將六味薰洗方尉之而後傅收傷油極妙或傅失痛散亦可內宜將補中益氣湯加五味子主之枳殼散治産後陰門破傷或陰腫下脫內出枳殼燒存性上為細末麻油和敷患上收傷油治金瘡及擦破之妙方也麻油一合椰子油二錢乳香沒藥各五分小麥五錢上以小麥入麻油中煮一炊時候麥變黑色浮油上以絹布濾去滓下火入余藥攪勻綿浸磁器收貯聽用六味熏洗方艾葉上荷葉上干萊卜葉上經三年以上者佳防風中枯礬下甘草皮中痛甚者倍加上為大劑以水五六升煮連滓熏洗補中益氣湯方見諸書不復録失痛散滑石黃丹甘草各二錢質干一錢上極細末雞子清和調先入手帛於熱湯中絞取尉患處便傅産後乳汁少第二十三古論曰乳汁乃氣血所化其或不行者皆由血氣虛弱所致也雖然有屢産乳汁絶無者則不得謂特由氣血虛弱也若夫血氣虛弱奚能屢懷妊蓋素乳脈壅閉不能為乳者而已故如絶無乳者雖與藥率皆不效惟雖有乳不甚多者宜服藥以通之今擇經驗方列於下通乳煎産後乳汁少者宜服之當歸王不留行天花粉甘草各上柴胡穿山甲香附子各中上作大劑水煎凡欲服此藥先以赤小豆二合煮熟食一盞訖服藥汁一碗復每歷一炊時服藥食小豆如前法最後尋飲溫酒少許凡欲令小兒吮乳宜揉乳頭數遍而後與之木通丸治産後百日內不乳出者木通葉六錢牡蠣四錢麥門冬二錢上為細末丸大豆大蒲黃為衣每服四十五粒日三夜三忌五辛生蔬他煎湯胡桃散通乳汁之妙劑穿山甲一錢帶皮胡桃十個上為細末分作三貼宜每食前服一貼服後吃醴酒二盞凡服日三二三日而必有奇效可祕玄素散百草霜天花粉各等分上細末每服一錢大麥煮汁送下日二一臘內服服僅一日而見奇效如神一臘七朝也通乳瓢畜飲瓢畜一錢桔梗八分天花粉七分紫蘇五分甘草五釐上五味以水一盞半煮取一盞溫服産後目疾第二十四婦人産後眼昏頭暈虛渴口乾者宜熟地黃湯若午後至夜昏花不明者四物補肝湯若産後崩漏亡血過多致睛珠疼痛者四制香附丸若瘀血留滯發血暈赤脈遮睛隱澀難開者宜芎藭湯又不問産前産後凡眼內紅腫痛爛難開者以掃紅煎熏洗內服加味四物湯若怒滿白睛疼痛甚者以灼明煎頻熏煎內服退血湯極妙熟地黃湯審視瑤函治産後婦人眼昏頭暈虛渴口乾氣少腳弱熟地黃酒洗曬乾八分糯米一撮人參一錢麥門冬去心一錢五分甘草炙五分花粉三錢上銼劑水二鍾薑一片棗二枚去核煎至八分去滓服四物補肝湯同治婦人産後午後至夜昏花不明熟地黃焙乾二兩香附子酒製川芎白芍藥酒洗炒當歸身酒洗炒夏枯草各八錢甘草四分上共為細末每服二三錢食後滾白湯送下四制香附丸同治婦人産後崩漏亡血過多致睛珠疼痛經水不調等證香附杵去皮毛淨子八兩分作四分酒醋童便鹹水煮曬炒熟地黃酒水煮爛搗膏黃蘗酒炒各一兩澤蘭葉淨葉白芍藥酒洗炒當歸炒各一兩半益母草四兩勿犯鐵器除地黃膏另入余藥共為細末鋪地一宿去其火性煉蜜為丸如梧桐子大每服二三錢空心滾白湯送下芎藭湯祕方治婦人有瘀血發血暈因致眼疾者川芎梔子芍藥各二錢香附黃連各一錢白芷五分木香七分沉香八分茯苓五錢八分人參五分桔梗四錢三分柴胡一錢當歸七分菊花八分黃芩七分陳皮四錢上十六味照常水煎服掃紅煎治諸般眼患紅腫痛爛甘菊花黃連各錢半防風荊芥白芷各三錢紅花當歸各一錢芒硝二錢白礬五分上煎湯先熏後洗最效加味四物湯灼明煎退血湯並見青囊瑣探産後蓐勞第二十五蓐勞者生産後更似無它疾數日後四體倦怠乍起乍臥或五心煩熱寒熱如瘧或自汗盜汗咳嗽吐痰或口舌乾燥虛羸喘乏腹中絞刺是其候也至於已上證候略具則積日纍月漸漸柴瘠或加下利或加不食或加浮腫而終致不起矣其始雖似無它疾必脈細數或弦大無根此際不論惡露多寡宜用內補建中湯若自汗盜汗者加黃耆浮麥麻黃根如血氣虛弱産內失將理而成者人參鱉甲散三合散之類如五心煩熱熱熾而脈弦大有力者加味四物湯如四體疼痛乏力者懷熟地湯如虛熱悠悠盜汗咳嗽吐涎沫者宜新定補元煎虛甚者加人參四五錢又宜隨證加減如蒸蒸身熱口舌乾燥欲得飲水或咳逆上氣嘔吐者崔氏竹葉飲如虛汗不止者經效黃耆散麻黃根散之類宜選而用之凡自汗盜汗者用藥外並宜將龍骨散貼臍中尤效若此症纍月後至於四體羸瘦腕後肉脫形匾則雖扁倉復生不能挽回矣內補建中湯見産後人參鱉甲散治蓐勞皆由在産內未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虛羸乍起乍臥飲食不消時有咳嗽頭中昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沉困在床服此大效黃耆鱉甲各一兩牛膝七錢半人參茯苓當歸白芍桑寄生麥門冬桂心桃仁熟地黃甘草各半兩續斷二錢半上為細末每服先以豬腎一對去筋膜以水兩大盞生薑半分棗三枚煎至一盞去豬腎薑棗然後入藥末二錢蔥白三寸烏梅一個荊芥五穗煎至七分去滓空心晚食前溫服神效三合散治産後日久虛勞發熱當歸白芍茯苓地黃各一兩柴胡人參各一兩五錢黃芩半夏甘草各六錢川芎一兩上為粗末每服一兩加生薑三片紅棗一枚水煎食前服加減法如寒熱往來臍腹脹痛則去人參黃芩地黃加延胡桃仁如懶食喜睡頭眩則去柴胡加黃耆縮砂陳皮如骨蒸盜汗自汗則去川芎柴胡加鱉甲地骨皮牡蠣如痰喘咳嗽則去人參柴胡加麥冬貝母百合如面黃肌瘦乏力則去柴胡川芎加黃耆倍用人參加味四物湯汪石山治産後蓐勞四肢無力睡而汗出日晡潮熱口乾五心如炙熱熾而脈弦大有力者當歸川芎芍藥地黃各二錢半胡黃連蓁艽青蒿各五錢上以水五盞煮取二盞半服懷熟地湯聖濟治産後蓐勞寒熱肢體痛力乏熟地黃當歸人參白朮茯苓甘草淡竹葉鱉甲牛膝桂心麥門冬各一錢上水煎溫服新定補元煎元周定治産後蓐勞咳嗽吐痰寒熱盜汗顏色青慘或面戴陽肢體乏力或大便滑利者人參一二錢或四五錢白朮炒薑貝母牡蠣五味子各一錢二分訶子烏梅甘草各五分以水二合半煮取一合去滓溫服蒸熱加地骨皮鱉甲胡黃連咳嗽甚者加沙參百部根天門冬下利不止者加熱附子肉豆蔻崔氏竹葉飲治骨蒸唇乾口燥欲得飲水竹葉一握麥冬半夏各一升甘草炙三兩大棗二十枚粳米五合生薑三兩上水煎溫服經效黃耆散療産後汗出不止黃耆十二分白朮牡蠣茯苓防風麥冬去心生地黃各八分大棗八個上以水二升煎取七合去滓空心溫服黃耆得防風其功愈大為易於固表也麻黃根散治産後虛汗不止當歸黃耆麻黃根牡蠣煆為粉人參粉草各等分上㕮咀每服四錢水一盞煎至七分去滓溫服新定龍骨散此方豫所新定而治自汗盜汗之神藥也用此莫不悉神驗龍骨三錢五倍子五錢上二味極細末嚴醋和調貼臍中以紙蓋其上
