body:
  text: 卷三鎮帶辨第一夫婦人之有生産天地自然之理雖無醫藥當無難矣而今往往有橫生難生者有所由來也是故古人論七因曰久坐久臥以致氣不運行血不流順胎亦沉滯不活動故令難産一也恣食厚味不知減節故致胎肥而難産二也縱淫欲火擾於中血氣沸騰胎元漏泄或胎動小産或子肥白而不壽三也保胎之計切而或問卜禱神或聞適有産變者常懷憂懼心懸意怯因亦致難産四也少婦初産神氣怯弱子戶未舒展轉傾側兒不得出五也聽從愚蠢穩婆之言但見腹痛遽令努力以致橫生六也兒未欲生用力太早及兒欲出母力已乏令兒停止七也至本朝子玄先生則雖不盡舍其説特論鎮帶之害於生産列舉其弊斷然禁之余既信其言每遇妊婦叮嚀告戒務禁鎮帶然世俗泥滯舊習疑而不信孕婦亦懷恐懼而不從之夫以鎮帶緊扎腹者實非所宜也本朝習俗孕婦五月用鎮帶者未知昉何時築紫風土記及東鑑等諸書皆載其事而上自貴勝下至細民擇其月良辰以行賀儀稱曰著帶者既千有餘年今欲使天下人悉禁之焉可得勝乎夫醫之臨疾病在察機宜貴權變是以余則不廢舊儀每用軟絹或軟粗布掩纏全腹唯禁緊縛而已如此則人不致疑阻亦當免孕中疾患而不致難生此吾門之所法也穩婆不解事皆以為鎮帶緩則兒子肥大必令孕婦緊扎其腹以為保護切要之第一因之榮衛失順流而致身面浮腫或嘔吐痞塞種種證候若夫壯婦雖無甚害豈可效之哉是以醫家宜命孕家令鎮帶緊緩得中矣新定難産八因辨第二子玄先生曰産育發生之大端而今用鎮帶反壅壓發生之機乃譬之於宇下之竹預避其字則長達石下之草根移石則忽萌芽周以為是過當詭激之説也本朝婦人平生所用之帶其制大抵闊六七寸或至尺有餘而以粗布為干裹之以絮然後隨貴賤加種種表裝其狀殆如蓐常以之纏腰腹二三匝若以單布之鎮帶束腹者為壅壓發生機則當先禁平生之帶耳又曰禽獸之胎孕不假鎮帶之施設人亦不異於此也云云雖是似近情切理之言人豈可比於禽獸乎且雖禽獸不得言無難産余向歲見家豬之生産先生一子而次者不能出反覆顛倒呻吟悶亂逾宿才産又有一貓臨産子露半身而不娩苦楚殆極人為救之然後復生三子並皆死胎也夫人稟五常具七情天地間最靈者也故居處不結屋室則不住冬夏不異裘葛則不服飲饌不歷烹熟則不食況方其懷孕則不獨鎮帶之可護胎也衣食寒暄臥起動作亦宜均適焉若不節謹之者間致難産故貴豪家難産罕有而中人以下甚多者蓋在保護得宜與否也古來醫家皆云富貴家多難産貧賤者無之余救難産數百人貧賤者反多而富貴家甚少此吾説之所以反於衆也夫鎮帶之事宋元以上雖無其説保産機要達生編奚囊便方等既有其説保産機要云受胎三五月後常要緊束其身勿令胎放達生編云孕已知覺即宜用布一幅六七寸闊長視人肥瘦約纏兩道橫束腰間直至臨盆之時才解去若是試痛仍不宜解此有二妙胎未長成得此則腰膂有力些須閃挫不致動胎其一常令腹中窄狹及到解開則腹中乍寬轉身容易奚囊便方云凡懷妊必於四五個月前後用軟絹或帛闊七八寸自背纏至腹以針線縫注如兜肚樣晝夜不解倘胎長大覺胸中有氣急狀方可放線三分或五分不可滿寸漸以調之則肌肉有所束縛不使胎長極大便於産也而在本朝則古來妊娠五月皆用此帶而神聖之大統數千載不絶庶民之苗裔益繁滋則不得謂鎮帶害於生産也假令論其害於生育以去之中人以下或可信而至王公貴人則決不能改之是以與固執難行之説抗顏費辨不若循我邦之禮以意折衷無弊也今不拘鎮帶之有無又不依古賢所論七因新録難産八因但屬臆見俟有道之明質云婦人天賦薄弱者受孕而輸血氣於胎因此精神漸衰憊至臨産不堪用力往往致難産一也不論壯婦與怯婦兒子在腹中自長大是以臨産雖力息頻至不能出門戶遂子僵於腹中而不能分娩二也受胎之初父母交暢之精氣不得滿足雖才成胎以本有所缺或逮臨月亦多死腹中三也子宮口自欹側臨産雖陳痛頻來子頭向脅傍而不能出遂致露手不收四也臨月大便燥結數日不通既而臨産燥屎填滿廣腸推壓子宮而門戶為之窄狹因致不能出五也臨盆子頭已近人門以壅尿道雖力息才來未免期而反多與催生湯藥膀胱為之努脹而壓胎因致不分娩六也夏月縱取涼冬月不謹風寒並下焦受寒冷而臨産陽氣不能振亦致難産七也伸手高處或偶失跌仆地胎為之轉動或子宮口相戾臨産不隨正路八也産要第三懷孕七八月以後偶略曲身胎失其所或脅腹疼痛或腿股攣痛或腰曲不能伸或水血並下惟腰不甚痛名曰弄痛原非正産候宜施整胎術整胎術見産論翼懷孕九月忽然腰痛或血下或水下卻又不産名曰試月非正産若腰痛甚弩掙自來者致半産宜用大阿膠湯孕婦臨月忽然腰股拘急不能起者漸迫産期孕婦臨月忽小便頻並數十行者亦催産氣之兆孕婦臨月忽下水傾囊數升者亦為免身兆大阿膠湯見頓僕失踞胎動門臨産第四孕婦臨蓐子將出則臍腹急痛腰間重墜周身灼熱濈然汗出力息頻來而兩手握拳眼中出火欲臥不能臥欲不揚聲音不能止之産戶腫滿糞門迸急或遺尿或胞水血俱下有此十二候而子出育門婦人孕中壯健既至臨月臍腹急痛腰間重墜者宜用芎歸加桂湯已免身者先將清心湯安榮湯之類熱湯浸絞去滓取獨行散一二匙攪調以與之或加味芎歸湯兼用黑神散安神散之類亦可繼用牛膝散以下惡露若臍腹絞痛者猶兼以獨行散二三錢若不效惡露下少而發熱者宜行瘀煎又獨味山楂子三四錢水煎服此亦治兒枕痛勝藥也臨産陳痛時來時止止則直寐而鼻息鼾復忽陳痛來呻吟俗呼曰涅摸栗谷失脈沉緩而不數者切不可令其扶坐努力有此候者率皆不遽分娩矣須坐臥任意也此以母氣未振子宮未開故也宜與救生加附子湯臨産移時不能分娩則在産室中者不宜呫囁耳語也婦人聞之則生疑懼因令氣宇結滯而害乎産也辛訖則不可高聲喧鬧恐婦人由是驚動或妨熟寐則血氣不能收而發血暈矣二者不可不戒也臨産陳痛頻頻來將分娩卻不産數次後陳痛止而不來惟腰間重墜臍腹微痛者醫須先探宮以候兒若兒頭皮膜未破者雖至五六日為非死胎與盤珠煎脫花煎之類以俟其自然可也勿妄以手法催生若皮膜已破産宮下臭液惟臍下攣痛其痛不注糞門者多死胎也以回生術救之臨産陳痛來甚往來三四次兒頭已至産門二三日尚不下惟力息微微來脈沉緩不數者因陽氣虛餒也宜救生湯兼以雲母散溫酒調服若手足微冷者附子理中湯四逆加人參湯之類選而用之併兼用見龍散可也芎歸加桂湯將産腹痛者用此神效當歸川芎桂枝各等分上銼每服四錢水酒各一盞半煮取半溫服若嘔者加半夏生薑此方妙在水酒各半煎清心湯凡婦人諸般雜病及胎前産後諸疾悉能治之世人以此方為血暈之妙劑又治金瘡打撲損傷等證萍蓬根十五錢大黃八錢當歸川芎芍藥乾地黃黃芩黃連沉香各六錢人參檳榔子木香細辛桂枝丁子炙甘草各四錢上藥除丁子沉香肉桂木香在外不炒余藥合為一劑用好酒一杯將藥潤濕入鍋內炒至黃色為度取起攤地上候冷入前四味每三四錢以麻沸湯浸須臾絞去滓服再以滓以水一杯半煮取一杯溫服安榮湯治血暈妙方萍蓬根酒炒五錢人參白朮當歸川芎黃芩黃連桂枝木香各一錢甘草三分上十味細銼每服三錢麻沸湯浸絞取汁服獨行散治瘀血腹痛及血迷神昏方見産後血暈加味芎歸湯産後最為穩當功亦巨荊芥酒炒二錢當歸一兩川芎五錢桂枝二錢上四味水煎酒對服陳飛霞曰俟胞衣已下隨即服之永無血暈之患效經千百斷不誤人周按集驗良方云治産後血暈不省人事提起頭髮坐定不可眠倒急以燒紅炭投入陳醋內對鼻孔薰之自蘇另用當歸六錢川芎二錢荊芥穗炒黃二錢水煎臨服入好酒童便和服神效黑神散治産後血暈眼花頭旋起坐不得或瘀血不盡上逆耳鳴或惡寒戰栗呻吟昏憒者及兒枕痛等證此方治産後血迷之妙劑也火麻五月五日取苗洗淨無灰好酒浸一時許土器中燒存性上為末産訖服一錢則無血暈之患本邦婦人産訖必以麻皮縛頭髮手腕又綰以懸頸蓋取其能收血也妙功散治産後血暈頭目昏眩安神鎮心之妙劑茯苓二錢黃耆遠志各一錢人參桔梗各五錢辰砂一錢山藥木香各五分甘草一分上為細末每服一錢白湯送下虛人宜此方實人宜獨行散牛膝散行瘀煎並見血暈救生湯見半産脫花煎盤珠飲見胞衣不下附子理中湯見痢疾雲母散良方救療産難經日不生及胞衣不下雲母粉五錢溫酒調服入口當産不順者即産萬不失一陸氏方云是何德楊方云已救三五十人卻用雲母粉澄過研細取一團如雞子大臨用以無灰酒調下四逆加人參湯甘草二兩炙附子一枚生去皮破八片乾薑一兩半人參一兩上四味以水三升煮取一升二合去滓分溫再服再加當歸桂枝數錢功更捷見龍散治難産及胞衣不下者神驗雲母上百草霜上白芷中烏龍尾中麝香下上為細末每服一二錢溫酒送下海蘿湯亦可産後第五産訖遽呼吸促迫者難治此證率皆眼睛無神而言語清輕然大抵過一霎時必發煩躁或交牙而死其死期已迫鼻中必青涕流出凡産後詳小腹痛與不痛軟與硬可知惡露之多寡痛與硬者惡露多反之者否又詳大便通與不通可知津液之干潤大便通者津液足反之者否又詳乳汁飲食多少可知胃氣之充餒多者胃氣充反之者否宜先審此三者更參考脈證以施治法産後忽然口噤手足搐搦角弓反張或因怒氣發熱迷悶者將愈風散用水酒童便各半盞煎一盞灌之若牙關緊者以曲頭管灌之仍捻其鼻使得下喉即活矣曲頭管圖見附録愈風散治産後中風不省人事口噤牙緊手足瘛瘲如角弓狀口吐涎沫亦治血暈四肢強直或築心眼倒吐瀉欲死荊芥穗酒炒至黑當歸身尾各三錢上為末每服三錢豆淋酒及童子小便調下其效如神凡生子肥盛壯實者産後惡露下自少生子羸瘦虛弱者惡露下必多産時下血多者産後惡露少視其惡露少妄與破血之駿劑者謬矣産後以血下之多津液自乏法當大便五六日而來若過之不通小腹硬滿脈沉有力者為有胃熱宜急與龍飛丸二三十粒導大便以救津液若小腹硬痛者有瘀血宜行瘀煎若産後一二日而大便下利者胃中虛冷也宜理中湯之類行瘀煎周新定治産後血暈惡露不下及兒枕痛神效接骨木上紅花當歸芍藥桂枝山楂子桃仁各中川芎蘇木甘草各下上十味水煎溫服此方不特治産後惡露不下凡瘀血結滯成諸疾者用之神效方中接骨木能通瘀血山楂子消滯血妙在此二品理中湯人參白朮乾薑炒黑甘草炙各等分上照常水煎産後惡露有六七日而止者又有至十餘日者蓋以其人瘀血有多寡也當用尋常調血之劑若及逾月淋漓不止者宜膠艾四物湯惜紅煎若不效者云垂煎去竹茹加柏葉蒲黃各五分佐以雙烏散食空白湯送下此止血之勝藥也膠艾湯惜紅煎並見崩漏云垂煎見傷寒啓微下産後疲勞甚者及産前患下利而産後有熱者俱宜用芎歸理中湯尤效但當倍加人參用乾薑炒黑者若惡露下多虛憊甚熱壯而口燥者將還元煎煎成臨服加童子小便一小杯兼以雙烏散屢試屢效産後婦人不涉深虛在蓐中血熱不去者桂枝調血飲夾外邪者熟料五積散若壯婦而不大便熱盛者大黃牡丹湯或三黃熟艾湯隨證加減而用之芎歸理中湯即理中湯加川芎當歸還元煎見半産雙烏散蓮房灰棕櫚灰各等分上二味燒存性極細末白湯點服桂枝調血飲治産後氣血虛損脾胃怯弱惡露不行致心腹疼痛發熱惡寒自汗口乾頭暈眼花等者桂枝當歸川芎芍藥白朮茯苓陳皮香附丹皮乾薑炒益母草各等分甘草減半每服四錢水煎溫服大黃牡丹湯見半産熟料五積散陳飛霞曰此方專治婦人産後外感內傷瘀血不行痰凝氣滯頭身痛惡寒發熱心腹疼痛寒熱往來似瘧非瘧小腹脹滿傷風咳嗽嘔吐痰水不思飲食胸緊氣急手足搐搦狀類中風四肢痠疼渾身麻痹凡産後一切無名怪症並皆治之夫産後百節俱閉氣血兩敗外則腠理不密易感風寒內則藏府空虛易傷飲食稍有不慎諸證叢生古書有産後以大補氣血為主雜病以末治之之戒後世莫不遵之惟事滋補不知風寒未去食飲未消滋補一投反成大害昧者猶以為藥力未到愈補愈深死而後已天下之通弊莫此為甚豫昔於潭州遇師指授此方按法治之往輒裕如不敢自祕逢人口授並刊板印送於茲四十餘載活人莫可勝紀但慮世人不悟以為淺近之方安能神應若是故古人謂千金易得一訣難求豫今訣破庶狐疑頓釋方名五積者謂此方能去寒積血積氣積痰積食積也今産後之病怯正犯此五積以五積之證投五積之方豈非藥病相值乎猶慮藥味辛散而以醋水拌炒名熟料五積散俾藥性和緩表而不發消而不攻方內所用肉桂解表逐寒白芍和營諸衛蒼朮厚朴走陽明而散滿陳皮半夏疏逆氣以除痰芎歸薑芷入血分而祛寒濕枳殼桔梗寬胸膈而利咽喉茯苓去飲寧心甘草和中補土大虛大怯者加人參微虛者可不用共為溫中散寒之妙劑用於産後無往非宜白芷二錢肉桂一錢此二味不必炒厚朴川芎半夏枳殼炒蒼朮茯苓白芍炮薑陳皮炙甘草已上各一錢當歸二錢虛加人參一錢上藥味皆宜稱過除白芷肉桂在外不炒余藥合為一劑用好醋小半杯淨水一杯與醋和勻將藥潤濕入鍋內炒至黃色為度取起攤地上去火毒候冷入白芷肉桂在內生薑三片紅棗三枚淨水二碗煎至一碗熱服此方至平穩見效之後依而服之不拘劑數以愈為度惟産後大汗泄瀉或虛脫之證忌之蓋此方但能去病不能補虛三黃熟艾湯見傷寒啓微下産後二三日小腹有大塊如盤以手按之則遷移者不得一概謂瘀血雖不下血塊者過五六日則必自消蓋此氣塊而已當用尋常産後治法若七日以上依然不消者宜察其虛實用破血之劑産後六七日惡露已快下仍腰股攣急或疼痛者不可一概為殘瘀而治焉往往有挾疝而然者余於此證用加味通氣湯每每奏奇效方見兒枕痛門孕婦已産則蒸蒸身熱胸中築動呼吸短息濈然汗出猶平人勞動奔走呼吸不接也此際特可懼者脫血一證也若發此證則必致卒亡矣預防之法宜用冷水一小盞點黑神散一匙以與之血熱得清冷而胸中開豁浮散之陽歸源而神氣清快實免産後暴血之神丹也不知者以為寒涼傷胃也然分娩用力甚五內擾亂身熱如毀投之以一盞冷水者如久旱霢霂自咽喉入胃中之際化為溫湯故無有後患然不可再與之矣夫冷水澀血勝於諸藥故婦人月信過多時飲一盞則須臾血自止可以證也雖然易産如達者宜斟酌矣産論云産婦分娩後切無用産椅當倚褥高枕而右側臥也云云後學宜遵之撥俗習矣豫又有一口訣凡臨産用力過多而才娩者須先與冷水一小盞乃命坐婆手握綿絮緊閉育門使婦匍匐移褥跪坐手尚不可放令一人緊抱婦半時許待氣息虛里稍定而後高枕褥臥則無有血迷崩血患也俗習禁産後熟寐若寐則看守者數呼其名不應則不止甚不可夫熟寐則血氣流暢能歸源易收也但宜使一人在傍常聞其呼吸呼吸平夷則俟自覺來而可也若呼吸促迫或目竄視則急呼起而可與藥也産訖有遽嘔吐者此由臨産之時坐婆強與食也與理中湯加半夏生薑難産力息數來而陳痛不來由此産母疲倦二三日又不分娩則死胎也醫為救之免者宜先與當歸理中湯還元煎之類若從産後三日無拘虛實必用折衝飲之説變證立至謹之戒之産後口鼻見黑色而衄者胃氣虛憊而血滯也宜二味參蘇飲二味參蘇飲人參一錢蘇木二錢上以水一盞半煮取一盞溫服産後面赤嘔逆欲死者名曰沖肺以二味參蘇飲加芒硝一錢若敗血衝心煩悶者難十救一産後煩悶嘔惡腹滿腹痛者名為沖胃平胃加桂枝生薑湯主之平胃加桂枝生薑湯蒼朮厚朴陳皮桂枝生薑各等分甘草減半上照常水煎産後腹滿不減歷數日漸漸復舊者此為常疾若産訖腹遽縮小者必屬虛家不可不察産訖世俗皆以麻線緊扎婦之頭髮而云防血暈此雖俗習亦有據千金方曰産後心悶眼不得開即當頂上取發如兩指大強以人牽眼即開即此意也産後二三日邦俗以糯粃味噌汁煮食之豫少以為出於愚婦臆見者昨偶讀五雜組曰稻有水旱二種又有秫田其性黏軟故謂之糯米食之令人筋緩多睡其性懦也作酒之外産婦宜食之因知俗習有所原出矣産後三四朝有忽發寒熱者謂之蒸乳寒熱止後乳汁大行此蓋胃氣所浮化也若無寒熱脈虛數而乳汁絶不出者此榮衛不調急宜與內補當歸建中湯否則彌月後漸漸發寒熱而成蓐勞內補建中湯此藥令人氣血壯健當歸桂枝各中芍藥上炙甘草下上每四錢薑三片棗二枚煎去渣入飴糖一塊再煎一沸溫服産後血暈第六産後發血暈此其婦素有積聚由産而動乃與瘀血相搏惡露不下遂逆上湊心因致昏悶焉宜先以淬醋炭令聞其氣繼以清心湯行瘀煎牛膝散之類兼服獨行散熊參丸等又一法治心下硬滿神昏口噤不省人事者將硇砂石灰各等分水和勻盛器近鼻孔令聞其氣則醒此本蠻人之方即與用炭醋意同若惡露下多而暈者病人低頭昏悶煩亂而心下不硬滿此為虛暈還元煎扶陽飲清魂湯宜選用或兼用愈風散桃花散震靈散妙功散之類凡胞衣不下而發血暈者從於産論所論宜先施禁暈之術施之暈猶不止面目唇口無血色手足微冷譫語者難治若面目唇口紅活而脈未至微細者急與扶陽飲兼用雲母散乃當下其胞衣其下胞衣之法已至於近産門則安之不可急取下焉若急取下則氣血脫泄而禍不旋踵謹之戒之聖惠牛膝散治産後血迷及兒枕痛牛膝一兩桂枝赤芍當歸炒木香牡丹皮川芎延胡索各半兩桃仁三分麩炒上銼每服四錢水煎溫服按産論折衝飲即此方去木香加紅花也獨行散婦人良方治産後血暈昏迷不省衝心悶絶五靈脂二兩半生半炒上為末溫酒調下二錢口噤者拗開口灌之入喉即愈周曰不須拗開口即用曲頭管吹入則落喉曲頭管圖見後元周按衛生方名立應散證治準繩名五靈脂散但炒令煙盡研末用治婦人血崩及男子脾積氣兼能解毒及蛇蠍蜈蚣咬塗傷處立愈一方每服三錢水酒童便各半盞煎至八分通口服名抽刀散治産後有病服三服散惡血或心腹脅肋腳痛不可忍者或止用童子小便佳參熊丸熊膽真者味苦有香氣而不腥解之無一點之渣滓燒之為灰其色灰白色而平夷偽者亦味苦有腥氣不香解之有渣滓燒之則作泡高起其色黑而不為灰人參各二錢上細末打米糊丸梧桐子大每服六七丸白湯下扶陽飲當歸川芎桂枝乾薑炒黑附子熟人參各一錢半上七味以水二合煮取一合溫服清魂湯治産後血暈昏不知人澤蘭葉上人參去蘆上荊芥穗炒上上甘草中川芎下上五味每服四錢水煎溫服本為散用豫每作湯屢驗桃花散此治血暈之神藥也烏賊魚骨十錢硃砂二錢上為末每服一二錢白湯送下清心湯見臨産行瘀煎見産後雲母散見臨産還元煎見半産愈風散見産後震靈散見藏燥妙功散見臨産胞衣不下第七産後胞衣不下為之致斃者豫常愍然以為非命之死也若夫産科熟練之醫於分娩之近速救療之則莫有胞衣不下之理矣娩後未經數時則陰中滋潤子宮不收口是以手術易施藥餌亦有效但其施術之法功效最速而非筆力之可形容焉因舉羅浮山人集驗方所載一法於後頃由是潛心覃思或當冰融焉雖歷一二日不下者胞衣在近門戶一二寸者猶可療也若胞衣在高黏著子宮底不離且子宮已收口則不能遽下之此證間有肚腹堅滿觸之痛甚手不可近者以千金半膝湯脫花煎之類兼進含陽散若虛者盤珠煎加人參二三錢此皆百死中求一活之法也若夫歷四五日戰栗發熱一日二三度作或煩渴汗出或譫語煩躁或飲食不進或喉中有痰聲者必死集驗方云産下如胞衣不來先將嬰孩抱定不可斷臍帶周云當斷臍帶而施術假令斷之曷害於子母耶用一伶俐老成女眷將右手二指緊跟臍帶而上帶盡處將指向上半寸余摸之覺有血便是胞衣逆轉盛血在內不得下即以指連胞衣向下一捺其血覆其衣自隨而下法甚簡明每見孕婦衣不下多服藥或用吐法甚至以足拄腹者易至喪命小必至於成病不知衣之不下正為嬰孩出門臍帶一扯衣必逆轉向上汙血淋下盡入衣中以致衣漸滿大不能出夫豈藥力之所能與哉故特書之以免此患往歲一貧家婦産後數月經血不止已用膠艾四物溫經等湯毫末無效豫將黃連解毒湯兼用獨味蓮房灰日二三錢不日而奏全效一日婦謂豫曰妾至於今凡八産其初産再産則傭穩婆而托之其後懷孕至五月則以帛自纏腹已至彌月稍覺腰腹攣痛則設草與故絮於屋隅乃就灶下燃釜沸湯而待生下若陳痛頻來則趨坐於草上而努力已分娩則厲聲呼鄰家婦東都貧民所居之屋大抵一棟而分數家隔壁一層以成鄰而與俱浴兒自收拾穢物胞衣訖乃倚被而坐焉過二三日則與平常無異矣如此者總六産曾不請媼婆其間偶胞衣不下者半日因自銜頭髮使油氣入咽溫溫欲吐而衣即下云此雖出發愚婦一時之智實與薛新甫蔣示吉等有銜頭髮尾作嘔而胎衣自下之法暗相合矣豫亦用此法凡遇壯婦之胎衣不下者則常以雞翎或紙捻探其咽中令其噁心而取效甚多如怯弱婦容易勿施含陽散家方治胞衣不下神效蝮蛇燒存性雲母鹿角燒存性各一錢麝香二分上細末每服一二錢海蘿湯攪調頓服千金牛膝湯治産兒胞衣不出令胞爛牛膝瞿麥各一兩當歸通草各一兩半滑石二兩一方用桂心二兩葵子半升上六味㕮咀以水九升煮取三升分三服周按羅浮山人集驗方用牛膝瞿麥當歸木通葵子各一錢滑石赤小豆各二錢命曰經驗難産奪命方脫花煎景嶽全書凡生産臨盆此方最佳並治難産經日不下並死胎胞衣不下俱妙當歸一錢川芎三錢桂枝二錢牛膝二錢車前子一錢五分水煎加酒對服若胎死不下及胞衣不來並加芒硝五錢氣虛困劇者加人參二三錢更加附子二錢無不下者此方比平胃散加芒硝功勝百倍以其藥味甘溫不傷元氣故也盤珠煎家方治難産經日不下並死胎及胞衣不下當歸一錢川芎二錢半桂枝牛膝各二錢附子一錢水煎先飲溫酒一盞尋服此藥虛甚者加人參二三錢健捷散祕家治難産經日及胞衣不下又尋常經閉兒枕痛等服此其效如神香白芷乾薑桂枝雲母各等分上四味細末每服二三錢海蘿湯攪和勻頓服桂芎當歸散治胞衣不下當歸川芎芍藥地黃桂枝各二錢牛膝五分上六味生薑水煎溫服治胞衣不下屢試驗妙乙齋種子編芒硝三錢牛膝當歸各五錢上三味水酒煎服一方治胞衣不下茄子陰乾為末白湯送下又方酸漿實熟紅者壓而陰乾上細末每服一枚許海蘿湯下治難産經日不下及胞衣不出者神效方太永醫話取烏鴉左翅全者十二枚燒研末每服一錢海蘿湯送下即時出下谷頭踏街一武士室女年十九歲天性伶俐父母鐘愛太甚而女偶與一奴通而娠事已發覺而奴先見追後父母竊相議謂令其施白牡丹術則恐害乎性命遂決令偷生因令稱病而不令逢於人逮其娩身兒子生地呱聲達四鄰女慮臭聲外聞隕家聲驚畏而發血暈醒後胞衣不下百藥不效既歷九日而邀余余便往坐堂上則女自房內步出而求診余心竊疑胞衣不下數日而行步如常乃望之面色青慘唇舌無血色問之臍帶三日而腐脫惟微微下黃汁而已近之則臭氣撲鼻切其脈沉徑候其腹縮小獨臍下微滿堅硬如石余乃欲按其腹以下胞衣居然不移蓋以子宮已收其口復本位也因進大劑脫花煎加芒硝二貼其夕下血片一甌許然其家以余術之無捷效又延醫求藥腐穢漸漸下歷纍月而得盡矣唯形體羸瘦飲食不成肌膚遂為廢人者一年有半然後氣體漸復十又余月而始得為完人矣余嘗治胞衣不下者以百數其逾七八日而尚不出者率皆見發熱譫語等證而不救焉嗟乎此女有天稟所實而然者歟豈不亦奇哉産後顛狂第八産後顛狂言語錯亂神思不安如有鬼祟者人皆以為敗血衝心也按其人本有鬱怒釀成癥瘕因産藏府擾亂遂動其宿症與瘀血相併奔騰而侵心神者也宜與鐵砂牡蠣湯三黃硃砂煎之類兼用抱膽丸極效若屬血虛者加味八珍湯兼服妙功散震靈散之類若瘀血一滴不下者行瘀煎大黃牡丹湯並可鐵砂牡蠣湯治由鬱怒心神不寧言語錯亂似有鬼祟者鐵砂上柴胡上大黃中牡蠣中茯苓中桂枝中甘草各下上七味水煎溫服三黃硃砂煎黃連黃芩大黃各等分每服二錢水煎臨服入硃砂一錢攪勻服抱膽丸水銀二兩黑鉛一兩五錢硃砂一兩細研乳香一兩細研上將黑鉛入銚內火熔開下水銀攪結成砂子下硃砂乳香乘熱用柳木槌研勻丸如雞頭實大每服一丸空心薄荷湯下得睡勿驚覺覺來即安周按産論鎮亢丸即此方而去乳香一味加味八珍湯産後顛狂乃血虛神不守舍不補養元氣則不可此方主之人參白朮茯苓甘草炙當歸川芎芍藥熟地遠志茯苓各二錢上銼加薑棗水煎服妙功散治産後心神顛倒語言錯亂如見鬼神方見臨産震靈散行瘀煎見産後大黃牡丹湯見半産
