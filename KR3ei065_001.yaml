body:
  text: 卷一胎子位置形狀論第一余壯歲西遊子玄先生之門學産科術蓋其術皆出於親試獨得而診訣占候實精詳煆煉是以其施治皆莫不有神驗也可謂能究産蓐微奧矣余乃覃思研精晝夜不輟於是不出百日而得入其室矣及還東都再取其所著産論及翼等書沉潛反覆而讀之論中有謂大抵五月之後腹中胎大如瓜必背面而倒首其頂當橫骨上際而居焉其胞衣則蓋於胎之尻上而當母鳩尾之下至臨月按之可得別其體貌而盡矣又曰自其背而探之其左右足膝皆張而旁出則應是其面作箕服或結趺也如其手膊則並展其臂而常自依脅旁則未嘗縮手足也云云又閲産論翼載背面倒首而皮膜裹胎其胞衣則見附蒂於上而蓋尻上其莖則從膜上垂下過脊背越左肩向腹部之圖豫嘗依其論與圖而沉思默想者不啻纍月積年未能攻究其胞莖之貫皮膜而至臍之處在何地而為何狀也疑之久之頃歲城南山下門外笹井某妻妊娠方期月忽腹疼腰痛於是人定速余治診即便往發劑飲之而拊摩其腹則蹲循之際兒便産下而無啼聲乳媼抱起看時亦無手足面目唯蠢乎微動乃以為怪物將裹草棄之余細檢之隔膜才見兒頭面手足謂曰此囊兒也因就熟視之胞衣在腹部而其形橢上至頷下下逮臍下而胞衣四邊薄皮引出以包裹胎視之如雲母屏中物兒在其內屈臂握手以魚腹印耳下其形似邦俗取膏肓穴之狀又局兩膝而膝頭僅過乳上膝外廉與膊內廉相齧猶人登圊狀臍帶則自左手與胸旁之間蟠屈而出二寸許斜至肩余即執小刀剖頷下膜男子也則白膜縮蹙歸於胞四邊矣急含少水以噀兒面始揚聲啼叫衆皆稱天幸哉余取胞衣置於油單紙上以攤視之其形圓匾徑六寸許其外面則中央最厚至邊而漸薄高低出沒皺皮錯交其色紫紅緑黑混然相雜而不甚濃又往往有紫黑濃斑點反覆視其裡面則有文理筋絡宛乎似荷葉裡面其色紫碧黑比表面則稍淡筋絡則青與白交加參錯其胞莖則如無名指大而若人工捻作者然又類於繩索其色不異筋絡按胞莖始出其色灰白色既而過一二時變為青白參錯莖中有三孔相通余以為一以輸氣一以注血一反氣血者也是亦若人有咽與喉而氣穀道各異者歟未可知也皮膜之形如歷制海蛇其色淡黃也近八街堀葺屋匠妻年二十七彌月而産囊兒女子也亦復如是其所異者肚帶紆曲在於右腰聞而已於是乎始悟子宮者蓋附著於腎腸前面而為一界郭而兒在於其中也背面倒首而屈手足其頷著缺盆骨上而面與膝頭相聚若自窺臍者其形蟠縮一團若煮蝦魚然胞衣則對兒腹皮膜自生裹胎其胞蓋當子宮中後面而黏著母之血氣繇是先入胞內乃流布於文理筋絡自文理筋絡達於胞帶中之隊孔而至臍中以將養於兒者無疑故知彌月將産而陳痛頻至八髎腰髖之邊幾摧而周身灼熱漐漐汗出者此胞衣著母體之處將離脫之勢爾以此推之則如龐安常云兒出胞而誤執母腸胃故隔腹針兒虎口於法開云使積日不娩之婦食羊十餘臠而針是則須臾羊膋音聊脂膏也裹兒出盛起東云將分娩但子抱母心因便針之之類雖後之醫家稱譽其明診以載於書籍豈足可信哉儒門事親云醫者不察孕加燔針於臍兩旁方不數月生一女子兩目下各有燔針痕又太平聖惠和劑局方婦人良方等書所載催生丹方後云服一丸即時産隨男左女右手中握出是亦虛言空論殆惑來學皆刪去而可也夫子宮者自是腸胃外囫圇一界郭爾必非有孔竅而通於腸胃者矣子在其中也胞與膜裹之無一點孔竅其胞附著子宮而受養乘其將分娩之勢而皮膜自破漿水迸出然後兒出門矣奚有執母腸抱母心羊膋裹兒手握藥出兩目下有燔針痕等事邪不但此也魏志所載華他診甘陵相夫人有娠使人手摸知所在在右則女在左則男人云在左於是為湯下之果下男形之類試之今日無有的確是皆後人信筆增奇者而已曷足為法乎古人妄誕往往有此類學者不可不擇也頃又覽明錢雷人鏡經附録載男女胎元圖說云精勝其血自左子宮受氣而男形成精不勝血自右子宮受氣而女形成又曰男負陽而抱陰故頭東而足西女負陰而抱陽故頭西而足東頭與手足蟠行一團如卵黃然其漿水如卵白也又曰胞帶起於兩腎中間著脊而生有一系繫於兒臍懸兒於胞中此通母之血氣遺蔭之道路也云云而其胎元圖作低頭踡局腰背屈曲兩足男首向左女首向右仰而橫臥者此皆本十九難所謂男子生於寅女子生於申之義而設圖說者耳雖似可憑至其以子宮為二男女頭足異乎東西懸兒於胞中仰而橫臥則臆度亦甚近閲蘭醫牒分的兒産科書載易産難産圖總二十有三而其胞衣有戴於頭頂者有蓋於尻上者又有負於背藉於臀插於兩股間者且其胎形狀則有橫生倒生礙産肚帶攀其肩也偏産見額角也棖後頭之後骨偏掛穀道兒即露額也及頷掛橫骨而出雙手或一足已出而胞帶將出或肩臨子戶而出帶或湊兩腳於面前臀向人門而露一手或臀出其半而不能達或腹向産戶而出胞帶或與上形同而不露帶或背脊向子宮口或肚帶纏頸而四肢將出或兩足與一手已出子門或駢屈兩膝而將出又雙胎一則仰臥一則跨其上而露其臍帶又正産仰出者伏出者礙橫骨者拄肛門者向腰左右者等之異其他形狀不能備録而胞衣之所在不一者彼以為子宮有欹側正直之殊也然不載胞之對腹者則彼未睹囊兒乎其圖說雖似詳或出臆見者十過其半嗟乎萬古以來不論華夷凡醫家於懷孕圖說泛濫懵懂紛紛不一者皆由不觀真囊兒故未有一人能為的當之說者也夫蘭人雖言事出其實豈能如殷紂刳孕婦腹而視之乎哉故其所圖不可信據也夫吾子玄先生於産科一技終身用意刻苦是以其術超邁於古今如其所謂素背面倒首而無轉身者則千古卓見也雖然至其謂胞衣蓋胎之尻上其手膊並展依脅旁而其左右足膝皆張而旁出未嘗縮手足則偶未深考耳又産論翼中所録懷孕圖凡三十有二而其胞衣皆表裡反復不無可疑也又如被膜胎圖余所稱囊兒是也則為胞在腹中其帶垂下而出育門帶頭皮膜生而裹胎者亦不可解也苟若其所圖則産訖當胞莖近兒臍而有皮膜余治産婦無慮數百人見其生子未嘗視皮膜之附著於胞莖者又未視胞與膜相離者其偶相離者則死胎經日而娩者及胞衣日久而漸漸壞下者皆皮膜腐敗與穢物並下也其他豈有此理哉夫膜也者附著於胞衣裡面之薄皮自引延而包胎者爾凡尋常生産兒子瞥然出門然後胞衣尋下者皆皮膜忽縮蹙於胞之四邊故人多不識之也今舉其胞莖而視之則膜之垂下者藹藹如車蓋則膜之與胞衣不相離者可知矣何有胞莖生皮而裹兒邪且摘胞之遊旒而徐剝之胞與膜隨手而離此亦兩片相合故復徐徐分拆之則離成兩片而其表面著於胞者薄脆易破裡面比表面則粗而厚強故較難破余幸獲觀二囊兒之一男一女而數年大疑釋然冰解從前謬迷一時霧散豈不亦愈快哉雖然不敢自斷為是或得復視數兒如此則此說永為鼎鍾銘録矣唯恨余今年歲已不惑稟受怯弱死生難期況囊兒千百中之一二而已假令有之大抵托於無智生婆則孰能詳正之乎我終身不能復視未可測也因姑記所目擊與所發明以示同志後來君子若遇囊兒而不異乎余所說則請繼續於此以為萬世定規矣嗟乎子玄先生之書率出於實驗實得議論切當有益今日而其論不及於此其有差忒者疑未嘗遇真囊兒而妄作之圖說歟抑門人誤記亦未可知也噫先生今既往矣恨我不在其生時以斯質焉篇內所論諸圖悉見卷六宜以參看辨駢胎位置第二凡駢胎腹象皆突出於前而高比之尋常娠腹則甚大而不張於左右比及臨月揣其兩脅則空軟由此觀之駢胎之在子宮中必非二胎正相位左右也其胎纍重於前後者無疑矣而其分娩也後者先出而前者後生也雖子玄先生之精核未及於此而為相併於左右者乃其候法曰任脈窪成一道者孿胎也余屢視攣胎腹未嘗見其如此者偶有似為窪者決非孿胎也惟其腹形大抵七八月已上漸慚突出如甕者是也圖說見卷六宜以參看孿胎一胞辨第三宇宙至大也至夫事物之變化則雖聖人亦有所未盡也自非聖人以下則雖常有之物非所親視歷觀而推理以究任臆為斷則恐誤天下後世不淺也在我醫則為最甚矣今夫以有涯之性命欲親規歷觀而究無涯之變化以傳之後世是豈易得盡乎哉子玄先生於産科書率皆出於所親歷實驗詳悉審辨似無遺漏矣産論翼中所載孿胎圖凡六一逆一正雙逆雙正雙坐等非不精細也然而唯出兩胎各有胞者而未載雙胎一胞者且産論曰任脈窪成一道者為孿胎之候然此惟五六月間見之至八九月一道者即隱不見但腹左右大張狀有稜角而腹面卻平是為孿候産論又云一倒首向下一豎頭向上其胞衣各一是為孿胎正法或雙皆上首共一胞胞皆大如盤是為孿孕奇法矣而不說孿子肚帶之狀吾未一見其真物豈可不容疑於茲哉己酉初夏城東富澤坊買故衣利兵衛妻娠方九月小便癃閉煩渴引飲腹滿太甚四肢亦浮求治於余乃與五苓散而撫摩其腹者三日得小便快利而四肢見皺紋然其腹猶便便因以為是必孿胎更候其腹容無任脈窪成一道又非腹面平而左右有稜角唯圓高突出倍尋常娠腹耳既而至五月初四而舉二男其先出者正産後出者逆生也胞衣一而其形平長徑一尺許橫不過七八寸筋絡甚粗而生二帶其一則在於去中央一寸許而大如無名指其一則去中央三寸余近邊僅寸許較之於近中央者則其細居半爾後見孿胎數人雙皆順生而一逆一正者卻寡且其胞衣皆一而臍帶所著之處各不同也近橫山街打金匠妻及本石坊小津某妻娠而腹甚大突出於前面而如抱甕既而期月臨盆俱先生一女後乳一男胞各一其生下皆正産但此二人胞各一而已嗚呼先生父子竟不視孿胎一胞而又皆正産者歟若其有親視則盍並列之圖中以示後學邪抑先生父子之所遇者多是一正一逆而胞衣各有歟將余之所視皆順且一胞者多歟雖然余之所親視既以十數則以頭之倒豎互殊者與胞之各有者為孿胎之正法吾不敢從也又至於以任脈窪而成一道者與腹面平而左右有稜角者為孿胎之腹容吾愈不信也覽西洋牒分的兒産科書孿胎圖式亦惟載各兒各胞者而未舉雙胎一胞者則亦未深究而已噫事物之不可究盡者率皆如斯矣雖然凡孿胎吾所親歷視者胞皆一者實多則吾將以胞之一者為孿胎正法以胞各有者為奇法也後之醫者若疑我說則每遇孿胎親視其胞而究其形狀又召坐婆數人詢其所親視則必有得之矣然後知吾言之不妄耳吾豈敢妄立一家言而駁前輩成說邪一産二子命呼第四一産兩子古人所稱不一今採録余之所看過者以示初學曰雙生昭十一年左傳注及西京雜記曰孿說文曰孿子戰國策曰兩胎後漢書華他傳曰孖津之切一産二子也鄭漁仲六書略曰駢胎褚氏遺書曰二胎病源候論曰雙生公羊傳曰孿生宋伯象睽車志曰孖生五雜組曰孿生槐西雜志又揚子方言曰陳楚之間凡人獸乳而雙産謂之釐孳秦晉之間謂之僆子自關而東趙魏之間謂之孿生又字彙二女曰𡦞辨孿子兄弟第五孖生之疑兄弟其說尚矣何休解公羊云其雙生也質家據見立先生文家據本意立後生所謂據見者據其所見前後生以判兄弟也所謂本意者其意以為後生者先受胎故以先生為弟以後生為兄也是殷周文質之所以殊也西京雜記霍光引殷王祖甲許釐莊公楚太夫唐勒鄭昌峕文長蒨滕公李生皆一産二子並以前生者為長證之則亦似無異論然王長公引公羊傳文家據本意立後生之文即以後生為兄則後人不知其所適從焉按巢氏病源論云陽施陰化精氣有餘故生二胎餘數就孖生驗其胞衣胞一者常多兩者甚少夫二精交暢當成一胎而今二胎之成一胞而生兩帶則蓋其一則精氣之餘贏耳巢氏之說似可據也但其孖生體有肥大健強瘦小疲弱之異焉肥大健強者承母將養之厚而瘦小疲弱者承將養之薄此將養之厚者主而將養之薄者客是以不論分娩之前後以肥大健強者為兄而可也且夫孿子之在母腹俱在一囊膜中自一胞衣而承將養又何可以受胎之前後而論之也但胎自有主客異耳又孿子臍帶之附胞衣一生中央一生一邊者多而其居中央者必大而居一邊者必小此亦主客之分最可取信者也若孿子並健強疲弱相均則依霍氏之說而可也又如孿子胞各一則此非精氣有餘者蓋交接再各成胎者無疑也其肥瘦強弱並無齊等則從王氏之說而可千載以來未有辨此義而斷之者噫明李空同曰雙生以後為兄者昧化理者也凡産必回轉下首首下則生矣即以受氣前後論則回轉時先氣者先生矣凡先者宜為兄凡先生者體較大亦先齔云云夫兒本蟠屈倒首於子宮中必非為回轉而出者也又有一胞孿子與孿子各胞之別李氏未辨此理而妄以受氣先後論先生後生定兄弟者可謂謬矣凡先生者體較大亦先齔云者亦未為盡然也産前産後諸證發明二十五則第六醫案一條附凡娠妊嘔不止者其因不一有痰飲蛔蟲痞積鬱結等之異其候證治方詳見惡咀門若諸藥不效則宜與蜜湯其功極偉是不可不知也有妊娠似勞證者有勞證似妊娠者分之之法二三月臍下胎仍不見則以其眼中悅澤白睛變青色者與掌中見紅色者肌肉不消脈不細數者此為娠候四月以上宜捫按其臍下手到而辨之矣又有勞證中而娠者大抵難治妊娠惡阻寒熱咳嗽盜汗懶執作等證若誤認為勞證而施治則雖誤治亦不害於生育勞證最初經閉二三月有前證者若誤認為惡咀而施治則卒致不救不可不審也娠而六七月以上其胎常逼胸下者其婦多有鬱火又娠而胎常在小腹者其婦多天賦薄弱若不然則病後體氣未平復而受孕者也妊娠有下利日三四行或五六行纍月不止百方不效者雖然肌肉不消飲食如故而無邪脈則不可慮也此症至臨月或産後而便自止是亦妊中常好食偏味者産後自止之類也俱難以理推極者也妊娠五六月有妊與否猶未可決者令婦仰臥須施産論翼按腹第六術數回其間不論左右脅傍必忽焉瞤動激射而觸醫手中其狀恰如電之眩目也其有之者斷然為妊娠不可不知也娠而有口舌糜爛者又有舌生芒刺如貓兒舌者並不分娩則不差嘗治長谷川君夫人妊娠七月舌旁糜爛凡溫冷入口則射舌因才食淡粥之微溫而已豫與清熱補血湯敷緑袍散十餘日依然不效便改投清熱補氣湯亦十餘日猶尚不愈竊以為非産後則不復姑以達生散加薄荷黃連外將城嫗散方見雜病試效加青黛貼之如此六七日而全差嗟乎藥之中肯綮不亦神乎有妊娠心下大膨脹者必無慮之未視由是害於産者此大抵氣脹或留飲之所致也宜順氣化痰之劑懷孕患惡咀者其婦必有蟲積或痰飲産後發血暈者其婦必有症癖鬱怒其無此者皆莫有二證也妊娠八月以上吐血者産後必發大患而終難救六七月前有之者無患然大吐血者甚殆凡小産婦女子惡寒戰栗後壯熱甚而大汗出或頭暈目眩飲食不美腹微滿按之軟弱而如綿絮此證甚似外感而實不然或有請醫而不告其實僞為外感求治醫雖詰問之匿不敢言者其識之之法臨按其腹部必鼻聞血臭也若然者宜斷為小産而施治法此余之所數歷驗也香川太衝行余醫言舉鼻嗅病人臭氣數症而於此一候遺之者何也治驗在卷六宜以參看凡臨産貴其婦有熱狀者與有汗者若無二狀則動輒不達而斃雖其能達産後多危殆凡臨産手背清冷者或面色無血色唇口青白及呼氣冷者或脈細而不數者皆非慶事産後多生變證産前患水腫逮産後腫滿益甚者用藥腫減十之八而余腫淹延數日不消則後必為不治症産後久泄自利完穀者雖服藥稍瘥竟致不起者甚多婦人身重則世醫食物禁忌甚嚴世俗亦守之而為一大緊要事方其阻病不食之時猶禁所好之物而致使婦益食少實可憐耳陳自明云凡妊娠惡食者以所思食任意食之必愈不可不察也凡方臨月大血數崩下者非子死腹中則免身後多致婦不起其天賦壯實者或有不然矣孕而七八月患久咳久泄等形體漸虛羸者候其腹容胎當臍腹而縮小胸下兩脅皆空軟可容指者則不出三日而必産生子多瘦弱育者甚罕凡臨産移時不娩煩渴不止者必死此證必脈無根腳而手足清冷凡臨産腹堅硬如石者必子僵腹中臨産二三日不能娩而加煩躁者死胎也若脈細弱時反張者子母俱危臨産二三日雖不分娩其婦飲食如故自能起居轉側眼中和而脈有精神者子雖死腹中醫施回生術令娩身則婦當不死若睛不和飲食不進脈微細者雖達多死妊娠六七月而上腰腳微腫者十居其半蓋以胎漸長壓母腸胃輒錯和而已不足深患大抵産後自消散雖然周身洪腫小便不利者宜隨脈證虛實而施攻補法勿必拘有胎而泥芎歸之類若夫身體腫脹甚久不消散而免身者子母並危治驗録卷六宜以參看凡妊娠不論月足與不足偶腰腹疼痛而産宮下水或血者必死胎也雖不腰腹疼痛或有所見而忽腹堅硬如石者亦必死胎也凡臨産數日不能娩而其婦反飲食健啖眼中清瞭發語輕捷或又笑言殆似不病人甚非佳事醫雖為救之産後多致不起矣此證不但妊婦也傷寒壞證水腫久不差等類往往有焉皆屬不治候不可不知也惡阻治法第七婦人孕二三月之間必中憒悶嘈雜噁心或吐痰沫或嘔飲食或心中懊憹好啖酸果或又好啖辛鹹物或頭目旋暈憎聞食氣或四肢倦怠不欲執作多臥少起厭厭困懶或四節煩疼面黃肌瘦或好未嘗食之物或惡其所常嗜之物或作寒熱頭痛或作胸膈煩悶或恍惚不能支持等之證巢氏病源此名惡阻又曰惡食稱惡字咱殷産寶方謂之子病小品方命阻病産經或呼病阻戴元禮曰俗謂之病鬼無論名呼多端宜先用清膈飲竹茹湯之類驅逐病痰必愈若嘔甚者並加伏龍肝一二錢若大段不欲飲食者千金生蘆根湯若其人體弱下利者半夏藿香湯集驗橘皮湯之類重者乾薑人參半夏加朮湯若腹中雷鳴下利者生薑瀉心湯渴而嘔者醫方筆記一方若疲極黃瘦小便不利者産經半夏茯苓湯四肢委然胸下痞悶者茯苓丸若挾痞積蛔蟲者蘆橘加半夏湯兼吞紅丸子或又烏梅丸理中安蛔湯之類若挾氣滯鬱結者二香散七氣湯選用其人素有鬱怒症疝等者必用左金丸各隨其症治之已上證候其不甚者則大抵逮輸三四月精神自清爽漸向平安又至其變則尚不愈或咳逆上氣不能橫臥或作下利作不食作吐蛔作肩背疼痛或寒熱咳嗽吐出白沫或惡明而坐暗處且不欲與人言又每睡著汗多出其狀殆如勞瘵甚則往往不出妊中而斃可不懼哉又作口舌乾燥作舌心焦煤或舌上生芒刺恰如貓舌或又有口舌糜爛妨飲食百藥不能療遂延産後而久不差者此因濕毒得疾當於産後口舌門取藥又有稟質羸瘦者每受孕必肥滿或肥滿者反瘦瘠又有懷孕已來無有惡阻候而至八九月遽噁心嘔吐不受藥食者清膈飲半夏茯苓湯可選而用然此症動輒至産後作蓐勞不可不早滋養氣血固根本也王碩云妊婦惡阻嘔吐全不納食百藥不療惟是紅丸子最妙佐以二陳湯服之但人疑其墮胎必不信服每每易名用之時有奇功方廣云大全方論半夏動胎而不用仲景方皆用半夏豈不知此而用乎豫治阻病纍用半夏薑製炒黃用之未嘗動胎經云有故無殞是也周云方之說雖確論然尚用薑製炒黃半夏則此拘陳氏說也用生半夏而可也凡方有病則雖巴豆硝黃亦不可畏也何況半夏乎清膈飲周新定方治妊娠嘔吐全不納藥食神效枇杷葉竹茹各一錢生半夏茯苓各一錢半上生薑七片水煎溫服集驗橘皮湯治任身嘔吐不可食橘皮竹茹人參術各三兩生薑四兩厚朴二兩凡六物切以水七升煮取二升半分三服之産經竹茹湯治痰熱惡阻嘔吐不下食半夏五兩竹茹橘紅各三兩茯苓生薑各四兩上水六升煮取二升分三服乾薑人參半夏治妊娠嘔吐不止乾薑人參各一兩半夏二兩生薑一兩上四味水煎溫服此即仲景乾薑人參半夏丸也豫每作湯子用之醫方筆記治惡阻一方橘皮人參竹茹各一錢麥門冬木瓜各二錢枇杷葉三大片藿香五分下咽即驗丹波康賴醫心方引産經云半夏茯苓湯治任身阻病心中憒悶空煩吐逆惡聞食氣頭重四支百節疼痛沉重多臥少起惡寒汗出疲極黃瘦方半夏五兩生薑五兩茯苓二兩橘皮細辛芎藭人參芍藥澤瀉甘草各二兩旋覆花一兩乾地黃二兩凡十二物以水一斗煮取三升分三服若病阻積日月不得治及服藥冷熱先候病變客熱煩渴口生瘡者除橘皮細辛用前胡知母各二兩若變冷下者除乾地黃用桂肉二兩若食少胃中虛生熱大行閉塞小行赤少者宜加大黃三兩除地黃加黃芩一兩余藥依方服一劑得下後消息看氣力冷熱更增損方調定即服一劑湯便急將茯苓丸令得食便強健也小品方同之小品方云茯苓丸治任身阻病患心中煩悶頭重眩目憎聞飯氣便嘔逆吐悶顛倒四支委熱不自勝持服之即效要先服半夏茯苓湯兩劑後將茯苓丸也茯苓一兩人參桂肉乾薑半夏炮各二兩橘皮一兩白朮枳實葛根屑甘草炙各二兩凡十物搗篩蜜和丸如梧桐子飲服二十丸漸至三十丸日三産經同之案原出外臺方紅圓子易簡方治阻病有痞積蟲積而為患者莪朮三稜橘皮青皮各五斤胡椒乾薑炮阿魏各三斤礬紅上為細末醋和為丸梧子大礬紅為衣每服三十丸薑湯二陳湯小半夏加茯苓伏龍肝湯等咽下蘆橘姜檳湯治妊娠嘔吐痰水不食生蘆根一兩橘紅七錢生薑一兩檳榔子三錢上作三次水煎服或加半夏二香散療妊娠胎氣不安氣不升降飲食不美嘔吐酸水起坐覺重宜服之香附子藿香葉甘草各二錢上為細末每服二錢入鹽少許百沸湯點下加減七氣湯直指方治氣鬱嘔吐半夏二兩半人參辣桂厚朴各一兩茯苓一兩半甘草炙半兩上每三錢半姜七片棗一枚煎服加木香亦得周按沈朗仲病機匯論去甘草加紫蘇橘皮尚名七氣湯治七情之氣鬱結於中心腹絞痛不可忍者左金丸治因鬱怒及症疝而嘔吐黃連六兩吳茱萸一兩同炒為末神麯糊丸如梧桐子大每服三四十丸白湯下生薑瀉心湯治惡阻嘔而腹中雷鳴下利者生薑四兩甘草三兩人參三兩乾薑一兩黃芩三兩半夏半斤黃連一兩大棗十二枚上八味以水一斗煮取六升去滓再煎取三升溫服一升日服烏梅丸治嘔而氣上衝心或吐蛔蟲者烏梅二十錢黃連十錢五分乾薑十錢細辛附子桂枝人參黃蘗各六錢當歸蜀椒各四錢上細末打米糊丸梧桐子大每服二三十丸量病輕重進之此方傷寒論所載分兩甚多倉猝之際難制因取原方三分之二改定以隨便爾生蘆根湯理中安蛔湯並見傷寒啓微妊娠吐血第八妊娠吐血者繹其所因驚怒憂思為之根基而其始或胸背疼痛或咳嗽連聲不止遂發此症矣不問何因先用清血湯兼進三聖散若因內傷氣上逆者甘草乾薑湯養中湯加減雞蘇散柔脾湯之類俱加童子小便半盞若因盛怒而致此症者芍藥地黃湯川芎三黃湯雞蘇散洞當飲之類併兼用四生丸若血勢猛而不止者將云垂煎加血竭棕櫚亂髮並燒存性一二錢有外熱者車輪煎加白芨花蕊石一錢尤神驗若隔二三日而吐血者麥冬飲子必勝散並有奇效凡諸血證用湯藥之外更將三聖散童便和下無不神驗夫童便之治血證長於諸藥而世醫不察遇血症則不論虛實唯犀角之求豫常為之浩嘆也齊褚澄云吐血服涼藥百不一生飲溲溺百不一死誠稱其功力優也不可不察也清血湯家方治吐血鼻衄咳血神效牡丹皮當歸川芎芍藥地黃山梔子蒲黃炒阿膠黃連百合麥門冬各中甘草下上十二味水煎溫服若血勢猛者加鼴鼠燒存性者三聖散止血之妙劑蒲黃酢炙棕櫚燒存性亂髮燒存性各等分上細末每服一錢童便和下急則淡酢湯亦得甘草乾薑湯炙甘草二錢黑炒乾姜一錢上以水一合半煮取一合溫服養中飲人參白朮乾薑各中甘草下白扁豆當歸阿膠各中艾葉上上以水二合煮取一合去滓溫服川芎三黃湯仁齊直指大黃濕紙裹蒸川芎黃連黃芩各等分每服二錢水煎溫服本為散用今為湯加減雞蘇散治婦人吐血心煩昏悶薄荷阿膠地黃柴胡上羚羊角黃耆甘草茜根中黃芩麥門冬當歸伏龍肝下每服四錢水一盞姜三片竹茹半雞子大煎至六分溫服芍藥地黃湯方見傷寒啓微吐血門洞當飲見産論柔脾湯治吐血衄血白汗出甘草下芍藥中黃耆中地黃上上銼每服四錢水二盞煎至七分去滓溫服四生丸療吐血衄血陽乘於陰血熱妄行生荷葉生艾葉生柏葉生地黃上等分爛研丸如雞子大每服一丸水三盞煎至一盞去滓溫服若無生者則將乾者細末醋和丸聽用云垂煎車輪煎並見傷寒啓微下麥門冬飲子病機匯論治吐血久不愈者麥冬黃耆各上人參當歸地黃各中五味子下上銼水煎溫服必勝散局方治男女血妄行吐血嘔血咯血衄血人參當歸熟地小薊川芎蒲黃炒烏梅上等分粗末水煎去滓服妊娠鼻衄第九肺通竅於鼻故肺生熱則熱氣迫血而鼻血宜用清血湯伏龍肝散遠志散之類兼服蓬砂散胡粉散最妙或將棕櫚亂髮反鼻鼴鼠之類燒黑者吹入鼻中而以紙醋醮塞鼻孔若尚不止者與四黃煎別以食鹽一合焙厚紙裹之尉百會穴其效如神或以杉原紙水醮置顛上入火於尉斗子以尉其上亦復妙若脾胃虛弱精神短少者人參飲子芎歸百草湯之類宜擇用伏龍肝散千金伏龍肝生地黃竹茹各上當歸芍藥黃芩川芎甘草各中上以水一盞半煮取一盞服遠志散聖惠方治鼻衄不止遠志中白芍中中天門冬中麥門冬中阿膠中當歸中藕節中大黃中甘草中桂枝下桃仁下沒藥上茈胡上生地黃上上水煎服蓬砂散蓬砂不拘多少細末每服四五分井花水送下神驗胡粉散聖惠治大衄不止胡粉炒黑細末醋服一盞即止四黃煎黃連黃芩大黃地黃各等分上水煎服人參飲子病機匯論治脾胃虛弱氣促氣虛精神短少衄血吐血人參上黃耆上麥冬上白芍中當歸中五味子中炙甘草下上水煎食遠服芎歸百草飲治鼻血不止當歸上川芎上人參中甘草下乾薑炒百草霜各中上水煎溫服凡衄不止者針足大指爪甲角及三里下其氣必止炙亦可妊娠胸滿第十妊娠胸下苦滿而痛者先哲以為胎上逼心乃名曰子懸子玄先生曰非胎而唯血氣上逼者甚多矣豫按又有由飲食停滯水飲停畜及氣鬱結而作此症者其飲食停滯者有吞酸噯腐惡心等證宜厚朴生薑湯清化湯之類若胸下膨脹漉漉有聲者此水飲停畜之所致也宜用小半夏加茯苓湯苓桂朮甘湯旋覆花湯等若肩背痛或氣宇不舒暢者屬氣滯紫蘇飲氣鬱湯之類宜擇用又有既至臨月忽覺腰腹疼痛或四肢如脫忽肚腹脹滿心下逼痛者此藥食並進停畜胸下之所致也必先吐出飲食而後當得陳痛至矣此以胎充足將出故其所食物不運化也厚朴生薑甘草半夏人參湯厚朴半夏生薑各上人參甘草各下上以水一盞半煎至一盞溫服清化湯飲食停滯胸腹飽悶嘔吐噁心服之神效半夏茯苓陳皮各上神麯山楂子麥芽黃連薑汁炒青皮香附子山梔子各中上水煎法同前小半夏加茯苓湯半夏上生薑中茯苓上上以水二盞煮取一盞溫服茯苓桂枝白朮甘草湯治心下有痰飲胸脅支滿茯苓上桂枝中白朮下甘草下上水煎法同前旋覆花湯治心下有寒飲嘈雜噁心口出清水旋覆花半夏茯苓各上芍藥陳皮桔梗肉桂細辛各中生薑上甘草下上水煎服紫蘇飲治妊娠氣結胎氣不和胸滿疼痛大腹人參川芎橘皮芍藥各中紫蘇上當歸下甘草下下生薑三片上以水一盞半生薑三片蔥白二寸煎至一盞溫服氣鬱湯治一切思念太過胸滿膈痛嘔逆脈沉澀者香附蒼朮半夏各上陳皮紫蘇具母茯苓梔子川芎各中木香檳榔甘草生薑各下上每服四錢以水二盞煮取一盞去滓溫服
